<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>STEEL FRONT - Mobile FPS</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Segoe UI',Meiryo,sans-serif; touch-action:none; }
  #game-canvas { position:fixed; inset:0; }

  /* ===== HUD ===== */
  #hud { position:fixed; inset:0; pointer-events:none; z-index:10; }
  #crosshair { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:24px; height:24px; }
  #crosshair span { position:absolute; background:rgba(255,255,255,.85); box-shadow:0 0 3px rgba(0,0,0,.8); }
  #crosshair .ch-t { left:11px; top:0; width:2px; height:7px; }
  #crosshair .ch-b { left:11px; bottom:0; width:2px; height:7px; }
  #crosshair .ch-l { left:0; top:11px; width:7px; height:2px; }
  #crosshair .ch-r { right:0; top:11px; width:7px; height:2px; }
  #hitmarker { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) rotate(45deg); width:26px; height:26px; opacity:0; transition:opacity .1s; }
  #hitmarker span { position:absolute; background:#ff3b30; box-shadow:0 0 4px #ff3b30; }
  #hitmarker .hm1 { left:12px; top:0; width:2px; height:8px; }
  #hitmarker .hm2 { left:12px; bottom:0; width:2px; height:8px; }
  #hitmarker .hm3 { left:0; top:12px; width:8px; height:2px; }
  #hitmarker .hm4 { right:0; top:12px; width:8px; height:2px; }

  #damage-vignette { position:absolute; inset:0; background:radial-gradient(ellipse at center, transparent 45%, rgba(200,0,0,.55) 100%); opacity:0; transition:opacity .15s; }

  #top-bar { position:absolute; top:calc(10px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%); text-align:center; color:#fff; }
  #wave-label { font-size:13px; letter-spacing:3px; color:#9fd4ff; text-shadow:0 0 6px rgba(0,120,255,.8); font-weight:700; }
  #enemy-count { font-size:11px; color:rgba(255,255,255,.75); margin-top:2px; }

  #score-box { position:absolute; top:calc(10px + env(safe-area-inset-top)); right:calc(12px + env(safe-area-inset-right)); text-align:right; color:#fff; text-shadow:0 1px 3px #000; }
  #score-box .score { font-size:18px; font-weight:700; color:#ffd257; }
  #score-box .kills { font-size:11px; color:rgba(255,255,255,.8); }

  #radar { position:absolute; top:calc(10px + env(safe-area-inset-top)); left:calc(12px + env(safe-area-inset-left)); width:104px; height:104px; border-radius:50%; border:2px solid rgba(120,200,255,.5); background:rgba(0,20,35,.55); box-shadow:0 0 12px rgba(0,0,0,.5); }

  #bottom-left { position:absolute; left:calc(14px + env(safe-area-inset-left)); bottom:calc(14px + env(safe-area-inset-bottom)); color:#fff; }
  #hp-bar { width:170px; height:9px; background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.35); border-radius:4px; overflow:hidden; }
  #hp-fill { height:100%; width:100%; background:linear-gradient(90deg,#3ddc84,#a7f3c8); transition:width .2s; }
  #hp-text { font-size:12px; margin-top:3px; text-shadow:0 1px 2px #000; font-weight:600; }

  #vehicle-box { display:none; margin-bottom:8px; }
  #vehicle-name { font-size:11px; letter-spacing:2px; color:#8affc1; text-shadow:0 1px 2px #000; font-weight:700; }
  #vehicle-bar { width:170px; height:9px; background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.35); border-radius:4px; overflow:hidden; margin-top:2px; }
  #vehicle-fill { height:100%; width:100%; background:linear-gradient(90deg,#3dc9dc,#a7e9f3); transition:width .2s; }
  #vehicle-speed { font-size:11px; color:rgba(255,255,255,.75); margin-top:2px; text-shadow:0 1px 2px #000; }

  #ammo-box { position:absolute; right:calc(14px + env(safe-area-inset-right)); bottom:calc(14px + env(safe-area-inset-bottom)); text-align:right; color:#fff; text-shadow:0 1px 3px #000; }
  #ammo-mag { font-size:30px; font-weight:800; line-height:1; }
  #ammo-reserve { font-size:14px; color:rgba(255,255,255,.7); }
  #weapon-name { font-size:11px; letter-spacing:2px; color:#9fd4ff; }
  #reload-hint { font-size:11px; color:#ffd257; height:14px; }

  #interact-hint { position:absolute; left:50%; bottom:26%; transform:translateX(-50%); font-size:14px; font-weight:700; color:#8affc1; text-shadow:0 0 8px rgba(0,255,140,.6); white-space:nowrap; display:none; }

  #killfeed { position:absolute; top:34%; left:50%; transform:translateX(-50%); text-align:center; }
  .feed-item { color:#ffd257; font-size:15px; font-weight:700; text-shadow:0 0 8px rgba(255,150,0,.7); animation:feedUp 1.2s ease-out forwards; }
  @keyframes feedUp { 0%{opacity:1; transform:translateY(0);} 100%{opacity:0; transform:translateY(-30px);} }

  #wave-banner { position:absolute; top:26%; left:50%; transform:translateX(-50%); font-size:34px; font-weight:900; letter-spacing:8px; color:#9fd4ff; text-shadow:0 0 20px rgba(0,140,255,.9); opacity:0; transition:opacity .4s; white-space:nowrap; }

  #ctx-lost { position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.75); color:#ffd257; font-size:15px; text-align:center; line-height:1.8; }

  /* ===== Touch controls ===== */
  #touch-layer { position:fixed; inset:0; z-index:20; display:none; }
  #joystick-base { position:absolute; width:110px; height:110px; border-radius:50%; border:2px solid rgba(255,255,255,.35); background:rgba(255,255,255,.08); display:none; }
  #joystick-stick { position:absolute; left:50%; top:50%; width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,.45); transform:translate(-50%,-50%); box-shadow:0 0 8px rgba(0,0,0,.4); }
  .tbtn { position:absolute; border-radius:50%; border:2px solid rgba(255,255,255,.4); background:rgba(20,30,40,.45); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; text-shadow:0 1px 2px #000; backdrop-filter:blur(2px); }
  .tbtn:active { background:rgba(120,200,255,.35); }
  #btn-fire { width:88px; height:88px; right:calc(26px + env(safe-area-inset-right)); bottom:calc(110px + env(safe-area-inset-bottom)); font-size:13px; border-color:rgba(255,120,100,.6); background:rgba(120,30,20,.4); }
  #btn-fire-alt { width:58px; height:58px; right:calc(140px + env(safe-area-inset-right)); bottom:calc(70px + env(safe-area-inset-bottom)); font-size:11px; border-color:rgba(255,120,100,.5); background:rgba(120,30,20,.35); }
  #btn-jump { width:56px; height:56px; right:calc(30px + env(safe-area-inset-right)); bottom:calc(220px + env(safe-area-inset-bottom)); font-size:11px; }
  #btn-reload { width:56px; height:56px; right:calc(120px + env(safe-area-inset-right)); bottom:calc(190px + env(safe-area-inset-bottom)); font-size:11px; }
  #btn-vehicle { width:64px; height:64px; right:calc(38px + env(safe-area-inset-right)); bottom:calc(300px + env(safe-area-inset-bottom)); font-size:11px; border-color:rgba(120,255,180,.6); background:rgba(20,90,50,.45); display:none; }

  /* ===== Screens ===== */
  .screen { position:fixed; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(160deg,#06131f 0%,#0b2438 55%,#123c55 100%); color:#fff; text-align:center; padding:20px; }
  .screen h1 { font-size:44px; font-weight:900; letter-spacing:10px; color:#cfe9ff; text-shadow:0 0 25px rgba(0,150,255,.9); margin-bottom:6px; }
  .screen .sub { font-size:13px; letter-spacing:4px; color:#7fb8e0; margin-bottom:28px; }
  .big-btn { pointer-events:auto; padding:14px 60px; font-size:18px; font-weight:800; letter-spacing:4px; color:#06131f; background:linear-gradient(180deg,#9fd4ff,#4da3e0); border:none; border-radius:6px; cursor:pointer; box-shadow:0 0 20px rgba(80,180,255,.5); }
  .big-btn:active { transform:scale(.96); }
  .howto { margin-top:26px; font-size:12px; line-height:1.9; color:rgba(255,255,255,.75); }
  #gameover-screen { display:none; background:rgba(10,0,0,.88); }
  #gameover-screen h1 { color:#ff6b5e; text-shadow:0 0 25px rgba(255,60,40,.9); }
  #final-stats { font-size:16px; margin-bottom:26px; color:#ffd257; line-height:1.8; }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<!-- ===== HUD ===== -->
<section id="hud" aria-hidden="true">
  <div id="damage-vignette"></div>
  <div id="crosshair"><span class="ch-t"></span><span class="ch-b"></span><span class="ch-l"></span><span class="ch-r"></span></div>
  <div id="hitmarker"><span class="hm1"></span><span class="hm2"></span><span class="hm3"></span><span class="hm4"></span></div>
  <div id="top-bar"><div id="wave-label">WAVE 1</div><div id="enemy-count">敵 残り 0</div></div>
  <div id="score-box"><div class="score" id="score-val">0</div><div class="kills" id="kills-val">0 KILLS</div></div>
  <canvas id="radar" width="104" height="104"></canvas>
  <div id="bottom-left">
    <div id="vehicle-box">
      <div id="vehicle-name">JEEP</div>
      <div id="vehicle-bar"><div id="vehicle-fill"></div></div>
      <div id="vehicle-speed">0 km/h</div>
    </div>
    <div id="hp-bar"><div id="hp-fill"></div></div>
    <div id="hp-text">HP 100</div>
  </div>
  <div id="ammo-box">
    <div id="weapon-name">M4A1 CARBINE</div>
    <div><span id="ammo-mag">30</span><span id="ammo-reserve"> / ∞</span></div>
    <div id="reload-hint"></div>
  </div>
  <div id="interact-hint"></div>
  <div id="killfeed"></div>
  <div id="wave-banner">WAVE 1</div>
</section>

<div id="ctx-lost">描画コンテキストを復旧中...<br>数秒待っても直らない場合は再読み込みしてください</div>

<!-- ===== Touch controls ===== -->
<div id="touch-layer">
  <div id="joystick-base"><div id="joystick-stick"></div></div>
  <button class="tbtn" id="btn-fire">FIRE</button>
  <button class="tbtn" id="btn-fire-alt">FIRE</button>
  <button class="tbtn" id="btn-jump">JUMP</button>
  <button class="tbtn" id="btn-reload">RELOAD</button>
  <button class="tbtn" id="btn-vehicle">乗る</button>
</div>

<!-- ===== Start screen ===== -->
<section class="screen" id="start-screen">
  <h1>STEEL FRONT</h1>
  <div class="sub">MOBILE 3D FPS — BATTLEFIELD STYLE</div>
  <button class="big-btn" id="start-btn">出撃する</button>
  <div class="howto" id="howto-text"></div>
</section>

<!-- ===== Game over screen ===== -->
<section class="screen" id="gameover-screen">
  <h1>戦死</h1>
  <div id="final-stats"></div>
  <button class="big-btn" id="restart-btn">再出撃</button>
</section>

<script>
'use strict';
/* =========================================================
   STEEL FRONT — Mobile 3D FPS (single file, Three.js)
   v2: 描画フリーズ修正 / マップ強化 / 乗り物(ジープ・戦車)
   ---------------------------------------------------------
   フリーズ修正の要点:
   - トレーサー/パーティクルを全てプール化(毎フレームの
     ジオメトリ・マテリアル生成/破棄を撤廃 → GPUメモリ枯渇と
     WebGLコンテキストロストを防止)
   - webglcontextlost / restored ハンドラで自動復旧
   - モバイルは pixelRatio 1.25 上限に抑えGPU負荷を軽減
   ========================================================= */

// ---------- Device detection ----------
const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) ||
                 (navigator.maxTouchPoints > 1 && 'ontouchstart' in window);

document.getElementById('howto-text').innerHTML = isMobile
  ? '左画面ドラッグ:移動(前いっぱいでダッシュ)<br>右画面ドラッグ:視点操作 / FIRE:射撃 / JUMP / RELOAD<br>乗り物に近づいて「乗る」ボタンでジープ・戦車に搭乗!'
  : 'WASD:移動 / マウス:視点 / 左クリック:射撃<br>Shift:ダッシュ / Space:ジャンプ / R:リロード<br>E:乗り物に乗る・降りる / 画面クリックでマウス操作開始';

// ---------- Core three.js setup ----------
const canvas = document.getElementById('game-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMobile, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.25 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = !isMobile;
renderer.shadowMap.type = THREE.PCFShadowMap;

// --- WebGL context-loss recovery (フリーズ対策) ---
let ctxLost = false;
const ctxLostEl = document.getElementById('ctx-lost');
canvas.addEventListener('webglcontextlost', e => {
  e.preventDefault();               // restore を許可するために必須
  ctxLost = true;
  ctxLostEl.style.display = 'flex';
}, false);
canvas.addEventListener('webglcontextrestored', () => {
  ctxLost = false;
  ctxLostEl.style.display = 'none';
}, false);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xc3d2de, 80, 300);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 900);
camera.rotation.order = 'YXZ';

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Lights ----------
scene.add(new THREE.HemisphereLight(0xd8e8f4, 0x50584a, 0.95));
const sun = new THREE.DirectionalLight(0xfff2d8, 1.05);
sun.position.set(60, 90, 30);
if (!isMobile) {
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  sun.shadow.camera.left = -110; sun.shadow.camera.right = 110;
  sun.shadow.camera.top = 110; sun.shadow.camera.bottom = -110;
  sun.shadow.camera.far = 250;
}
scene.add(sun);

// ---------- Procedural textures ----------
function makeCanvasTexture(size, painter, repeatX = 1, repeatY = 1) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  painter(c.getContext('2d'), size);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  return tex;
}
const groundTex = makeCanvasTexture(256, (g, s) => {
  g.fillStyle = '#6f6d54'; g.fillRect(0, 0, s, s);
  for (let i = 0; i < 900; i++) {
    g.fillStyle = `rgba(${70 + Math.random() * 50 | 0},${78 + Math.random() * 45 | 0},${45 + Math.random() * 35 | 0},.55)`;
    g.fillRect(Math.random() * s, Math.random() * s, 2 + Math.random() * 4, 2 + Math.random() * 4);
  }
  // 草むらパッチ
  for (let i = 0; i < 24; i++) {
    const x = Math.random() * s, y = Math.random() * s, r = 8 + Math.random() * 18;
    const gr = g.createRadialGradient(x, y, 0, x, y, r);
    gr.addColorStop(0, 'rgba(84,110,58,.55)'); gr.addColorStop(1, 'rgba(84,110,58,0)');
    g.fillStyle = gr; g.beginPath(); g.arc(x, y, r, 0, 7); g.fill();
  }
}, 40, 40);
const roadTex = makeCanvasTexture(256, (g, s) => {
  g.fillStyle = '#3c3e42'; g.fillRect(0, 0, s, s);
  for (let i = 0; i < 500; i++) {
    g.fillStyle = `rgba(${50 + Math.random() * 40 | 0},${52 + Math.random() * 40 | 0},${55 + Math.random() * 40 | 0},.4)`;
    g.fillRect(Math.random() * s, Math.random() * s, 2, 2);
  }
  // 中央破線 (テクスチャは横方向に走る道路用)
  g.fillStyle = 'rgba(230,220,180,.85)';
  for (let x = 8; x < s; x += 64) g.fillRect(x, s / 2 - 3, 34, 6);
  // 端の白線
  g.fillStyle = 'rgba(220,220,220,.5)';
  g.fillRect(0, 8, s, 4); g.fillRect(0, s - 12, s, 4);
}, 24, 1);
function facadeTex(base, winLit) {
  return makeCanvasTexture(256, (g, s) => {
    g.fillStyle = base; g.fillRect(0, 0, s, s);
    for (let i = 0; i < 250; i++) {
      g.fillStyle = 'rgba(0,0,0,.06)';
      g.fillRect(Math.random() * s, Math.random() * s, 3, 3);
    }
    for (let y = 20; y < s - 30; y += 52) {
      for (let x = 16; x < s - 30; x += 46) {
        g.fillStyle = 'rgba(0,0,0,.35)'; g.fillRect(x - 2, y - 2, 32, 40); // 窓枠影
        g.fillStyle = Math.random() < winLit ? 'rgba(255,238,170,.75)' : 'rgba(28,40,52,.9)';
        g.fillRect(x, y, 28, 36);
        g.fillStyle = 'rgba(255,255,255,.12)'; g.fillRect(x, y, 28, 8); // 反射
      }
    }
    g.fillStyle = 'rgba(0,0,0,.25)'; g.fillRect(0, s - 12, s, 12); // 基礎
  }, 2, 2);
}
const buildingTexA = facadeTex('#8f8d84', 0.28);
const buildingTexB = facadeTex('#7c8894', 0.2);
const buildingTexC = facadeTex('#9a8f7c', 0.35);
const containerTex = makeCanvasTexture(128, (g, s) => {
  g.fillStyle = '#7d3b2c'; g.fillRect(0, 0, s, s);
  g.strokeStyle = 'rgba(0,0,0,.3)'; g.lineWidth = 3;
  for (let x = 8; x < s; x += 16) { g.beginPath(); g.moveTo(x, 0); g.lineTo(x, s); g.stroke(); }
}, 2, 1);
const crateTex = makeCanvasTexture(128, (g, s) => {
  g.fillStyle = '#8a6b3f'; g.fillRect(0, 0, s, s);
  g.strokeStyle = 'rgba(60,40,15,.8)'; g.lineWidth = 6;
  g.strokeRect(4, 4, s - 8, s - 8);
  g.beginPath(); g.moveTo(4, 4); g.lineTo(s - 4, s - 4); g.moveTo(s - 4, 4); g.lineTo(4, s - 4); g.stroke();
});

// ---------- Sky / 遠景 ----------
{
  const skyTexC = document.createElement('canvas');
  skyTexC.width = 32; skyTexC.height = 256;
  const sg = skyTexC.getContext('2d');
  const grad = sg.createLinearGradient(0, 0, 0, 256);
  grad.addColorStop(0, '#3e6da0');
  grad.addColorStop(0.45, '#7fa8c9');
  grad.addColorStop(0.72, '#c3d2de');
  grad.addColorStop(1, '#d9e2e6');
  sg.fillStyle = grad; sg.fillRect(0, 0, 32, 256);
  const skyTex = new THREE.CanvasTexture(skyTexC);
  const sky = new THREE.Mesh(
    new THREE.SphereGeometry(430, 20, 14),
    new THREE.MeshBasicMaterial({ map: skyTex, side: THREE.BackSide, fog: false, depthWrite: false })
  );
  sky.renderOrder = -10;
  scene.add(sky);

  // 雲 (スプライト)
  const cloudC = document.createElement('canvas');
  cloudC.width = 128; cloudC.height = 64;
  const cg = cloudC.getContext('2d');
  for (let i = 0; i < 10; i++) {
    const x = 20 + Math.random() * 88, y = 22 + Math.random() * 22, r = 10 + Math.random() * 16;
    const rg = cg.createRadialGradient(x, y, 0, x, y, r);
    rg.addColorStop(0, 'rgba(255,255,255,.85)'); rg.addColorStop(1, 'rgba(255,255,255,0)');
    cg.fillStyle = rg; cg.beginPath(); cg.arc(x, y, r, 0, 7); cg.fill();
  }
  const cloudTex = new THREE.CanvasTexture(cloudC);
  for (let i = 0; i < 9; i++) {
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: cloudTex, transparent: true, opacity: 0.55 + Math.random() * 0.3, fog: false, depthWrite: false }));
    const a = Math.random() * Math.PI * 2, r = 160 + Math.random() * 190;
    sp.position.set(Math.cos(a) * r, 95 + Math.random() * 70, Math.sin(a) * r);
    sp.scale.set(90 + Math.random() * 80, 40 + Math.random() * 30, 1);
    scene.add(sp);
  }

  // 太陽グロー
  const sunC = document.createElement('canvas');
  sunC.width = sunC.height = 64;
  const sc = sunC.getContext('2d');
  const srg = sc.createRadialGradient(32, 32, 0, 32, 32, 32);
  srg.addColorStop(0, 'rgba(255,250,220,1)'); srg.addColorStop(0.3, 'rgba(255,235,170,.8)'); srg.addColorStop(1, 'rgba(255,220,140,0)');
  sc.fillStyle = srg; sc.fillRect(0, 0, 64, 64);
  const sunSp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(sunC), transparent: true, fog: false, depthWrite: false }));
  sunSp.position.set(210, 300, 105);
  sunSp.scale.set(120, 120, 1);
  scene.add(sunSp);

  // 山並み (遠景シルエット)
  const mtnMat = new THREE.MeshBasicMaterial({ color: 0x5f7488 });
  for (let i = 0; i < 22; i++) {
    const a = (i / 22) * Math.PI * 2 + Math.random() * 0.2;
    const r = 245 + Math.random() * 45;
    const h = 34 + Math.random() * 55;
    const m = new THREE.Mesh(new THREE.ConeGeometry(45 + Math.random() * 40, h, 5), mtnMat);
    m.position.set(Math.cos(a) * r, h / 2 - 4, Math.sin(a) * r);
    m.rotation.y = Math.random() * 3;
    scene.add(m);
  }
}

// ---------- Map ----------
const WORLD = 96;                 // playable half-size
const obstacles = [];             // AABB list {minX,maxX,minZ,maxZ,h}
const solidMeshes = [];           // for line-of-sight raycasts

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(WORLD * 2 + 60, WORLD * 2 + 60),
  new THREE.MeshLambertMaterial({ map: groundTex })
);
ground.rotation.x = -Math.PI / 2;

const TRACER_MAX = 28;
const tracerPool = [];

}
function spawnTracer(from, to, color = 0xffe08a) {
  const t = tracerPool[tracerIdx++ % TRACER_MAX];
  const arr = t.line.geometry.attributes.position.array;
  arr[0] = from.x; arr[1] = from.y; arr[2] = from.z;
  arr[3] = to.x; arr[4] = to.y; arr[5] = to.z;
  t.line.geometry.attributes.position.needsUpdate = true;
  t.line.material.color.setHex(color);
  t.line.material.opacity = 0.9;
  t.line.visible = true;
  t.ttl = 0.08;
}

const pMatCache = {};
function pMat(color) {
  if (!pMatCache[color]) pMatCache[color] = new THREE.MeshBasicMaterial({ color });
  return pMatCache[color];
}
const PARTICLE_MAX = 150;
const particlePool = [];

}
function spawnParticles(pos, color, count = 6, speed = 3, size = 1) {
  const mat = pMat(color);
  for (let i = 0; i < count; i++) {
    const p = particlePool[particleIdx++ % PARTICLE_MAX];
    p.m.material = mat;
    p.m.position.copy(pos);
    p.m.scale.setScalar(size * (0.7 + Math.random() * 0.8));
    p.m.visible = true;
    p.ttl = 0.4 + Math.random() * 0.25;
    p.vel.set(Math.random() - .5, Math.random() * .8, Math.random() - .5)
      .normalize().multiplyScalar(speed * (0.4 + Math.random() * 0.8));
  }
}

let expLightIdx = 0;
function flashExplosionLight(pos) {
  const e = expLights[expLightIdx++ % expLights.length];
  e.l.position.copy(pos).y += 1;
  e.l.intensity = 5;
  e.ttl = 0.4;
}
function updateEffects(dt) {
  for (const t of tracerPool) {
    if (t.ttl > 0) {
      t.ttl -= dt;
      t.line.material.opacity = Math.max(0, t.ttl / 0.08);
      if (t.ttl <= 0) t.line.visible = false;
    }
  }
  for (const p of particlePool) {
    if (p.ttl > 0) {
      p.ttl -= dt;
      p.m.position.addScaledVector(p.vel, dt);
      p.vel.y -= 9 * dt;
      if (p.ttl <= 0) p.m.visible = false;
    }
  }
  for (const e of expLights) {
    if (e.ttl > 0) {
      e.ttl -= dt;
      e.l.intensity = Math.max(0, e.ttl / 0.4 * 5);
    }
  }
}
function clearEffects() {
  for (const t of tracerPool) { t.ttl = 0; t.line.visible = false; }
  for (const p of particlePool) { p.ttl = 0; p.m.visible = false; }
  for (const e of expLights) { e.ttl = 0; e.l.intensity = 0; }
}

// ---------- Audio (WebAudio, no external assets) ----------
let AC = null, noiseBuf = null, noiseBufLong = null;
function initAudio() {
  if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
  AC = new (window.AudioContext || window.webkitAudioContext)();
  noiseBuf = AC.createBuffer(1, AC.sampleRate * 0.3, AC.sampleRate);
  let d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  noiseBufLong = AC.createBuffer(1, AC.sampleRate * 0.8, AC.sampleRate);
  d = noiseBufLong.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
}
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && AC && AC.state === 'suspended') AC.resume();
});
function playShot(vol = 0.22, freq = 900) {
  if (!AC) return;
  const t = AC.currentTime;
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  const f = AC.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(freq * 4, t); f.frequency.exponentialRampToValueAtTime(200, t + 0.12);
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
  src.connect(f).connect(g).connect(AC.destination); src.start(t); src.stop(t + 0.16);
  const o = AC.createOscillator(); o.type = 'square';
  o.frequency.setValueAtTime(130, t); o.frequency.exponentialRampToValueAtTime(50, t + 0.08);
  const g2 = AC.createGain(); g2.gain.setValueAtTime(vol * 0.6, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
  o.connect(g2).connect(AC.destination); o.start(t); o.stop(t + 0.1);
}
function playBeep(freq, dur, vol, type = 'sine') {
  if (!AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(); o.type = type; o.frequency.value = freq;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g).connect(AC.destination); o.start(t); o.stop(t + dur);
}
function playExplosionSfx(vol = 0.5) {
  if (!AC) return;
  const t = AC.currentTime;
  const src = AC.createBufferSource(); src.buffer = noiseBufLong;
  const f = AC.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(900, t); f.frequency.exponentialRampToValueAtTime(60, t + 0.6);
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
  src.connect(f).connect(g).connect(AC.destination); src.start(t); src.stop(t + 0.8);
  const o = AC.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(70, t); o.frequency.exponentialRampToValueAtTime(28, t + 0.5);
  const g2 = AC.createGain(); g2.gain.setValueAtTime(vol * 0.9, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
  o.connect(g2).connect(AC.destination); o.start(t); o.stop(t + 0.6);
}

  empty: () => playBeep(240, 0.05, 0.1, 'square'),

// エンジン音 (ループ)
let engine = null;
function startEngine(type) {
  if (!AC) return;
  stopEngine();
  const o = AC.createOscillator(); o.type = 'sawtooth'; o.frequency.value = 50;
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 320;
  const g = AC.createGain(); g.gain.value = 0.035;
  o.connect(f).connect(g).connect(AC.destination);
  o.start();
  engine = { o, g, type };
}
function stopEngine() {
  if (engine) { try { engine.o.stop(); } catch (e) {} engine = null; }
}
function updateEngine(speed) {
  if (!engine) return;
  const s = Math.abs(speed);
  engine.o.frequency.value = (engine.type === 'tank' ? 38 : 52) + s * (engine.type === 'tank' ? 5 : 7);
  engine.g.gain.value = 0.03 + s * 0.0035;
}

// 乗降
function nearestVehicle() {
  let best = null, bd = 4.5;
  for (const v of vehicles) {
    if (!v.alive) continue;
    const d = Math.hypot(v.obj.position.x - player.pos.x, v.obj.position.z - player.pos.z);
    if (d < bd + v.radius) { bd = d; best = v; }
  }
  return best;
}
function enterVehicle(v) {
  curVehicle = v;
  gunGroup.visible = false;
  firing = false;
  sfx.enter();
  startEngine(v.type);
  ui.vehicleBox.style.display = 'block';
  ui.vehicleName.textContent = v.name;
  ui.weaponName.textContent = v.type === 'tank' ? '125mm 主砲' : 'M2 重機関銃';
  ui.ammoMag.textContent = '∞';
  ui.ammoMag.style.color = '#fff';
  ui.reloadHint.textContent = '';
  updateVehicleUI();
}
function exitVehicle(forced = false) {
  if (!curVehicle) return;
  const v = curVehicle;
  // 横に降車 (障害物チェック)
  const side = new THREE.Vector3(Math.cos(v.yaw), 0, -Math.sin(v.yaw));
  for (const s of [1, -1, 1.6, -1.6]) {
    const px = v.obj.position.x + side.x * (v.radius + 0.8) * s;
    const pz = v.obj.position.z + side.z * (v.radius + 0.8) * s;
    if (!collides(px, pz, player.radius, v)) {
      player.pos.set(px, player.eyeHeight, pz);
      break;
    }
  }
  curVehicle = null;
  gunGroup.visible = true;
  firing = false;
  stopEngine();
  if (!forced) sfx.enter();
  ui.vehicleBox.style.display = 'none';
  ui.weaponName.textContent = 'M4A1 CARBINE';
  updateAmmoUI();
}
function toggleVehicle() {
  if (!game.running || !player.alive) return;
  if (curVehicle) { exitVehicle(); return; }
  const v = nearestVehicle();
  if (v) enterVehicle(v);
}

// 戦車砲弾 (プール)
const shells = [];
const shellGeo = new THREE.SphereGeometry(0.16, 6, 5);
const shellMat = new THREE.MeshBasicMaterial({ color: 0xffcc66 });
for (let i = 0; i < 4; i++) {
  const m = new THREE.Mesh(shellGeo, shellMat);
  m.visible = false;
  scene.add(m);
  shells.push({ m, vel: new THREE.Vector3(), ttl: 0 });
}
function fireShell(from, dir) {
  let s = shells.find(s => s.ttl <= 0) || shells[0];
  s.m.position.copy(from);
  s.vel.copy(dir).multiplyScalar(70);
  s.ttl = 4;
  s.m.visible = true;
}
function explodeAt(pos, radius = 6.5, dmg = 140) {
  sfx.explosion();
  spawnParticles(pos, 0xff8830, 18, 8, 3);
  spawnParticles(pos, 0x554433, 12, 5, 2.5);
  spawnParticles(pos, 0x333333, 10, 3.5, 3.5);
  flashExplosionLight(pos);
  for (const e of enemies) {
    if (!e.alive) continue;
    const d = e.obj.position.distanceTo(pos);
    if (d < radius) {
      damageEnemy(e, dmg * (1 - d / radius) + 25, e.obj.position.clone().setY(1.2));
    }
  }
  // 自分へのスプラッシュ
  const pd = player.pos.distanceTo(pos);
  if (!curVehicle && pd < radius * 0.8) damagePlayer(Math.round(35 * (1 - pd / (radius * 0.8))));
  const camD = camera.position.distanceTo(pos);
  if (camD < 25) shake = Math.max(shake, 0.5 * (1 - camD / 25));
}
function updateShells(dt) {
  for (const s of shells) {
    if (s.ttl <= 0) continue;
    s.ttl -= dt;
    s.vel.y -= 6 * dt;
    const steps = 2; // トンネリング防止
    for (let i = 0; i < steps; i++) {
      s.m.position.addScaledVector(s.vel, dt / steps);
      const p = s.m.position;
      let boom = p.y <= 0.1 || collides(p.x, p.z, 0.2, curVehicle) && heightBlocked(p);
      if (!boom) {
        for (const e of enemies) {
          if (e.alive && e.obj.position.distanceTo(p) < 1.4) { boom = true; break; }
        }
      }
      if (boom || s.ttl <= 0) {
        s.ttl = 0; s.m.visible = false;
        explodeAt(p.clone().setY(Math.max(p.y, 0.4)));
        break;
      }
    }
  }
}
function heightBlocked(p) {
  for (const o of obstacles) {
    if (p.x > o.minX - 0.2 && p.x < o.maxX + 0.2 && p.z > o.minZ - 0.2 && p.z < o.maxZ + 0.2 && p.y < o.h) return true;
  }
  return false;
}

// 車両運転
function updateVehicle(dt) {
  const v = curVehicle;
  // 入力
  let throttle = 0, steer = 0;
  if (isMobile) {
    throttle = -joy.y;
    steer = joy.x;
  } else {
    if (keys['KeyW']) throttle += 1;
    if (keys['KeyS']) throttle -= 1;
    if (keys['KeyA']) steer -= 1;
    if (keys['KeyD']) steer += 1;
  }
  // 加減速
  if (throttle !== 0) {
    v.speed += throttle * v.accel * dt;
  } else {
    v.speed *= Math.pow(0.4, dt); // 摩擦
    if (Math.abs(v.speed) < 0.15) v.speed = 0;
  }
  v.speed = Math.max(-v.maxSpeed * 0.45, Math.min(v.maxSpeed, v.speed));
  // 旋回 (速度に応じて)
  if (Math.abs(v.speed) > 0.3) {
    v.yaw -= steer * v.turnRate * dt * Math.sign(v.speed) * Math.min(1, Math.abs(v.speed) / 4);
  }
  // 移動 + 衝突
  const fx = -Math.sin(v.yaw), fz = -Math.cos(v.yaw);
  const nx = v.obj.position.x + fx * v.speed * dt;
  const nz = v.obj.position.z + fz * v.speed * dt;
  if (!collides(nx, nz, v.radius, v)) {
    v.obj.position.x = nx;
    v.obj.position.z = nz;
  } else {
    if (Math.abs(v.speed) > 6) {
      spawnParticles(v.obj.position.clone().setY(1), 0x999999, 5, 3);
      playBeep(90, 0.15, 0.15, 'sawtooth');
    }
    v.speed *= -0.25;
  }
  v.obj.rotation.y = v.yaw;
  // タイヤ回転
  for (const w of v.wheels) w.rotation.x += v.speed * dt * 2.2;
  // 轢殺
  if (Math.abs(v.speed) > 4) {
    for (const e of enemies) {
      if (!e.alive) continue;
      const d = Math.hypot(e.obj.position.x - v.obj.position.x, e.obj.position.z - v.obj.position.z);
      if (d < v.radius + 0.6) {
        damageEnemy(e, 999, e.obj.position.clone().setY(1));
        if (!e.alive) addFeed('轢殺!! +100');
        v.speed *= 0.85;
      }
    }
  }
  updateEngine(v.speed);

  // 三人称カメラ (プレイヤーのyaw/pitchでオービット)
  const cp = Math.max(-0.5, Math.min(1.1, player.pitch));
  const cd = v.camDist;
  const cx = v.obj.position.x + Math.sin(player.yaw) * cd * Math.cos(cp);
  const cz = v.obj.position.z + Math.cos(player.yaw) * cd * Math.cos(cp);
  const cy = v.camH + cd * Math.sin(cp) * 0.9 + 1;
  camera.position.set(cx, Math.max(0.8, cy), cz);
  camera.lookAt(v.obj.position.x, v.obj.position.y + 1.6, v.obj.position.z);
  // カメラシェイク
  if (shake > 0.01) {
    camera.position.x += (Math.random() - .5) * shake;
    camera.position.y += (Math.random() - .5) * shake;
  }
  // プレイヤー位置は車両に同期
  player.pos.set(v.obj.position.x, player.eyeHeight, v.obj.position.z);

  // 照準方向
  const camDir = new THREE.Vector3();
  camera.getWorldDirection(camDir);
  // 砲塔をエイム方向へ (v0.1.1: +Math.PI で180°反転していたのを修正)
  const aimYaw = Math.atan2(-camDir.x, -camDir.z);
  v.turret.rotation.y = aimYaw - v.yaw;

  // 射撃
  v.cd -= dt;
  if (firing && v.cd <= 0) {
    v.cd = v.fireInterval;
    const muzzleWorld = new THREE.Vector3();
    v.muzzle.getWorldPosition(muzzleWorld);
    const aimPoint = camera.position.clone().addScaledVector(camDir, 160);
    const dir = aimPoint.sub(muzzleWorld).normalize();
    if (v.type === 'tank') {
      sfx.cannon();
      fireShell(muzzleWorld, dir);
      spawnParticles(muzzleWorld, 0xffcc66, 6, 4);
      flashExplosionLight(muzzleWorld);
      shake = Math.max(shake, 0.35);
      v.speed *= 0.9;
    } else {
      sfx.mg();
      // MG raycast
      const spread = 0.015;
      dir.x += (Math.random() - .5) * spread;
      dir.y += (Math.random() - .5) * spread;
      dir.z += (Math.random() - .5) * spread;
      dir.normalize();
      shootRay.set(muzzleWorld, dir);
      shootRay.far = 250;
      const hitsE = shootRay.intersectObjects(enemyHitMeshes, false).filter(h => h.object.userData.enemy && h.object.userData.enemy.alive);
      const hitsW = shootRay.intersectObjects(solidMeshes, false);
      let end = muzzleWorld.clone().addScaledVector(dir, 250);
      const eDist = hitsE.length ? hitsE[0].distance : Infinity;
      const wDist = hitsW.length ? hitsW[0].distance : Infinity;
      if (eDist < wDist) {
        end = hitsE[0].point;
        damageEnemy(hitsE[0].object.userData.enemy, v.dmg, hitsE[0].point);
        showHitmarker();
      } else if (wDist < Infinity) {
        end = hitsW[0].point;
        spawnParticles(end, 0xb0a890, 3, 2);
      }
      spawnTracer(muzzleWorld, end, 0xffe9a0);
    }
  }
  updateVehicleUI();
}
function updateVehicleUI() {
  const v = curVehicle;
  if (!v) return;
  ui.vehicleFill.style.width = (v.hp / v.maxHp * 100) + '%';
  ui.vehicleFill.style.background = v.hp / v.maxHp > 0.35 ? 'linear-gradient(90deg,#3dc9dc,#a7e9f3)' : 'linear-gradient(90deg,#e0483d,#f3a7a0)';
  ui.vehicleSpeed.textContent = Math.abs(Math.round(v.speed * 3.6)) + ' km/h';
}

// ---------- Collision helpers ----------
function collides(x, z, r, skipVehicle = null) {
  if (x < -WORLD || x > WORLD || z < -WORLD || z > WORLD) return true;
  for (const o of obstacles) {
    if (x + r > o.minX && x - r < o.maxX && z + r > o.minZ && z - r < o.maxZ) return true;
  }
  for (const v of vehicles) {
    if (v === skipVehicle) continue;
    const dx = x - v.obj.position.x, dz = z - v.obj.position.z;
    if (dx * dx + dz * dz < (r + v.radius) * (r + v.radius)) return true;
  }
  return false;
}
const raycaster = new THREE.Raycaster();
function hasLineOfSight(from, to) {
  const dir = to.clone().sub(from);
  const dist = dir.length();
  raycaster.set(from, dir.normalize());
  raycaster.far = dist - 0.5;
  return raycaster.intersectObjects(solidMeshes, false).length === 0;
}

// ---------- Shooting ----------
const shootRay = new THREE.Raycaster();
function playerShoot() {
  if (weapon.reloading || weapon.cooldown > 0 || !player.alive) return;
  if (weapon.mag <= 0) { sfx.empty(); weapon.cooldown = 0.25; return; }
  weapon.mag--; weapon.cooldown = weapon.fireInterval;
  weapon.recoil = 1; weapon.spreadHeat = Math.min(weapon.spreadHeat + 0.15, 1);
  sfx.shoot();
  muzzleFlash.material.opacity = 1;
  muzzleFlash.rotation.z = Math.random() * Math.PI;
  muzzleLight.intensity = 2.5;
  player.pitch = Math.min(player.pitch + 0.009, Math.PI / 2);

  // spread
  const spread = 0.004 + weapon.spreadHeat * 0.02 + (moveMag() > 0.1 ? 0.012 : 0);
  const dir = new THREE.Vector3(0, 0, -1)
    .applyEuler(new THREE.Euler(player.pitch + (Math.random() - .5) * spread, player.yaw + (Math.random() - .5) * spread, 0, 'YXZ'));
  shootRay.set(camera.position.clone(), dir);
  shootRay.far = 300;

  const hitsE = shootRay.intersectObjects(enemyHitMeshes, false).filter(h => h.object.userData.enemy && h.object.userData.enemy.alive);
  const hitsW = shootRay.intersectObjects(solidMeshes, false);
  let end = camera.position.clone().addScaledVector(dir, 300);
  const eDist = hitsE.length ? hitsE[0].distance : Infinity;
  const wDist = hitsW.length ? hitsW[0].distance : Infinity;

  if (eDist < wDist) {
    const h = hitsE[0];
    end = h.point;
    const isHead = !!h.object.userData.isHead;
    damageEnemy(h.object.userData.enemy, isHead ? 68 : 28, h.point);
    showHitmarker();
  } else if (wDist < Infinity) {
    end = hitsW[0].point;
    spawnParticles(end, 0xb0a890, 4, 2);
  }
  const muzzleWorld = new THREE.Vector3();
  muzzleFlash.getWorldPosition(muzzleWorld);
  spawnTracer(muzzleWorld, end);
  updateAmmoUI();
}

function damageEnemy(e, dmg, point) {
  if (!e.alive) return;
  e.hp -= dmg;
  spawnParticles(point, 0xbb2222, 6, 3);
  sfx.hit();
  if (e.hp <= 0) {
    e.alive = false; e.deathT = 0;
    game.kills++; game.score += 100;
    sfx.kill();
    addFeed('敵兵を倒した +100');
    updateScoreUI();
  }
}

function reload() {
  if (curVehicle || weapon.reloading || weapon.mag === weapon.magSize || !player.alive) return;
  weapon.reloading = true; weapon.reloadTimer = weapon.reloadTime;
  sfx.reload();
  ui.reloadHint.textContent = 'リロード中...';
}

// ---------- Player damage ----------
function damagePlayer(dmg) {
  if (!player.alive) return;
  player.hp -= dmg;
  player.lastDamageTime = elapsed;
  sfx.damage();
  ui.vignette.style.opacity = Math.min(1, 0.4 + (1 - player.hp / player.maxHp) * 0.6);
  setTimeout(() => { if (player.hp > 30) ui.vignette.style.opacity = 0; }, 220);
  if (player.hp <= 0) { player.hp = 0; playerDie(); }
  updateHpUI();
}
function playerDie() {
  player.alive = false; game.running = false;
  stopEngine();
  document.exitPointerLock && document.exitPointerLock();
  document.getElementById('final-stats').innerHTML =
    `SCORE: ${game.score}<br>KILLS: ${game.kills} / WAVE ${game.wave} 到達`;
  document.getElementById('gameover-screen').style.display = 'flex';
}

// ---------- Enemy AI ----------
const tmpV = new THREE.Vector3();
function updateEnemies(dt) {
  let aliveCount = 0;
  // ターゲット: 乗車中は車両、徒歩ならプレイヤー
  const targetPos = curVehicle
    ? tmpV.set(curVehicle.obj.position.x, 1.4, curVehicle.obj.position.z).clone()
    : player.pos.clone();
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.alive) {
      e.deathT += dt;
      e.obj.rotation.x = Math.min(e.deathT * 4, Math.PI / 2); // fall over
      e.obj.position.y = -Math.min(e.deathT * 0.15, 0.3);
      if (e.deathT > 3) {
        scene.remove(e.obj);
        e.obj.traverse(m => { if (m.isMesh) { const k = enemyHitMeshes.indexOf(m); if (k >= 0) enemyHitMeshes.splice(k, 1); } });
        enemies.splice(i, 1);
      }
      continue;
    }
    aliveCount++;
    const ep = e.obj.position;
    const dx = targetPos.x - ep.x, dz = targetPos.z - ep.z;
    const dist = Math.hypot(dx, dz);

    // face target
    e.obj.rotation.y = Math.atan2(dx, dz);

    // --- v0.1.1: 視線チェックを間引きしつつキャッシュ (AI判断に利用) ---
    e.losT -= dt;
    if (e.losT <= 0) {
      e.losT = 0.25 + Math.random() * 0.15;
      const eyeE = new THREE.Vector3(ep.x, 1.6, ep.z);
      e.hasLos = dist < 80 && hasLineOfSight(eyeE, targetPos.clone());
    }

    // movement: approach until ~14m, then strafe (対車両はもう少し離れる)
    const keepDist = curVehicle ? 20 : 14;
    e.strafeT -= dt;
    if (e.strafeT <= 0) { e.strafeT = 1.5 + Math.random() * 2; e.strafeDir = Math.random() < .5 ? -1 : 1; }
    let mvx = 0, mvz = 0;
    if (!e.hasLos && dist < 70) {
      // v0.1.1: 視線が通らない時は距離に関係なく接近して回り込む
      mvx = dx / dist; mvz = dz / dist;
    } else if (dist > keepDist) { mvx = dx / dist; mvz = dz / dist; }
    else if (dist < 7) { mvx = -dx / dist * .6; mvz = -dz / dist * .6; }
    else { mvx = -dz / dist * e.strafeDir * .7; mvz = dx / dist * e.strafeDir * .7; }

    // v0.1.1: 障害物回避 — 進行方向が塞がっていたら左右にスライドして壁沿いに進む
    if (e.avoidT > 0) {
      e.avoidT -= dt;
      const ax = -mvz * e.avoidDir, az = mvx * e.avoidDir;
      mvx = ax; mvz = az;
    } else {
      const px = ep.x + mvx * e.speed * dt * 8, pz = ep.z + mvz * e.speed * dt * 8; // 少し先を確認
      if (collides(px, pz, 0.4)) {
        e.avoidDir = Math.random() < .5 ? -1 : 1;
        // 回避方向が塞がっていれば反対へ
        if (collides(ep.x - mvz * e.avoidDir * 1.5, ep.z + mvx * e.avoidDir * 1.5, 0.4)) e.avoidDir *= -1;
        e.avoidT = 0.5 + Math.random() * 0.5;
      }
    }

    const nx = ep.x + mvx * e.speed * dt, nz = ep.z + mvz * e.speed * dt;
    if (!collides(nx, ep.z, 0.4)) ep.x = nx;
    if (!collides(ep.x, nz, 0.4)) ep.z = nz;

    // v0.1.1: スタック検知 — 1.2秒間ほぼ動けていなければ回避モードに入る
    e.stuckT += dt;
    if (e.stuckT > 1.2) {
      const moved = Math.hypot(ep.x - e.prevX, ep.z - e.prevZ);
      if (moved < 0.6 && dist > keepDist) {
        e.avoidDir = Math.random() < .5 ? -1 : 1;
        e.avoidT = 0.8 + Math.random() * 0.6;
        e.strafeT = 0;
      }
      e.prevX = ep.x; e.prevZ = ep.z; e.stuckT = 0;
    }

    // walk animation
    if (Math.abs(mvx) + Math.abs(mvz) > 0.05) {
      e.walkPhase += dt * 9;
      e.legL.rotation.x = Math.sin(e.walkPhase) * 0.7;
      e.legR.rotation.x = -Math.sin(e.walkPhase) * 0.7;
    } else { e.legL.rotation.x = e.legR.rotation.x = 0; }

    // shooting — v0.1.1: 視線が通ってから少しエイムしてから撃つ (即撃ち理不尽さを緩和)
    e.shootCd -= dt;
    if (e.hasLos && dist < 65) e.aimT += dt; else e.aimT = 0;
    if (e.shootCd <= 0 && e.aimT > 0.35 && dist < 65) {
      e.shootCd = 1.1 + Math.random() * 1.6;
      const eyeE = new THREE.Vector3(ep.x, 1.6, ep.z);
      {
        sfx.enemyShoot(dist);
        if (curVehicle) {
          // 対車両: 命中しやすいがダメージは車両へ
          const hit = Math.random() < Math.max(0.15, 0.75 - dist * 0.007);
          const target = targetPos.clone();
          if (!hit) { target.x += (Math.random() - .5) * 4; target.y += (Math.random() - .5) * 2; target.z += (Math.random() - .5) * 4; }
          spawnTracer(eyeE, target, 0xff8866);
          if (hit) {
            const raw = 6 + Math.random() * 8;
            const vdmg = curVehicle.type === 'tank' ? raw * 0.35 : raw * 1.6;
            curVehicle.hp -= vdmg;
            spawnParticles(target, 0xffee88, 3, 3);
            if (curVehicle.hp <= 0) destroyVehicle(curVehicle);
            else updateVehicleUI();
          }
        } else {
          const playerMoving = moveMag() > 0.1 ? 0.18 : 0;
          const hitChance = Math.max(0.06, 0.55 - dist * 0.007 - playerMoving);
          const hit = Math.random() < hitChance;
          const target = player.pos.clone();
          if (!hit) { target.x += (Math.random() - .5) * 3; target.y += (Math.random() - .5) * 2; target.z += (Math.random() - .5) * 3; }
          spawnTracer(eyeE, target, 0xff8866);
          if (hit) damagePlayer(6 + Math.random() * 8 | 0);
        }
      }
    }
  }
  ui.enemyCount.textContent = '敵 残り ' + aliveCount;

  // wave clear
  if (game.running && aliveCount === 0 && enemies.length === 0) {
    game.waveClearTimer += dt;
    if (game.waveClearTimer > 2.5) {
      game.waveClearTimer = 0;
      game.score += 250;
      addFeed('WAVE クリア +250');
      updateScoreUI();
      startWave(game.wave + 1);
    }
  } else game.waveClearTimer = 0;
}

// ---------- Input: keyboard / mouse ----------
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyR') reload();
  if (e.code === 'KeyE' || e.code === 'KeyF') toggleVehicle();
});
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('contextmenu', e => e.preventDefault());

if (!isMobile) {
  canvas.addEventListener('click', () => { if (game.running) canvas.requestPointerLock(); });
  window.addEventListener('mousemove', e => {
    if (document.pointerLockElement !== canvas) return;
    player.yaw -= e.movementX * 0.0022;
    player.pitch = Math.max(-1.45, Math.min(1.45, player.pitch - e.movementY * 0.0022));
  });
  window.addEventListener('mousedown', e => { if (e.button === 0 && document.pointerLockElement === canvas) firing = true; });
  window.addEventListener('mouseup', e => { if (e.button === 0) firing = false; });
}

// ---------- Input: touch ----------
const touchLayer = document.getElementById('touch-layer');
const joyBase = document.getElementById('joystick-base');
const joyStick = document.getElementById('joystick-stick');
const joy = { active: false, id: null, ox: 0, oy: 0, x: 0, y: 0 }; // x,y in -1..1
const look = { id: null, lx: 0, ly: 0 };
let jumpQueued = false;

function moveMag() {
  if (isMobile) return Math.hypot(joy.x, joy.y);
  let m = 0;
  if (keys['KeyW'] || keys['KeyA'] || keys['KeyS'] || keys['KeyD']) m = 1;
  return m;
}

if (isMobile) {
  touchLayer.style.display = 'block';
  const JOY_R = 55;

  touchLayer.addEventListener('touchstart', ev => {
    for (const t of ev.changedTouches) {
      if (t.target.classList && t.target.classList.contains('tbtn')) continue;
      if (t.clientX < window.innerWidth * 0.45 && joy.id === null) {
        joy.id = t.identifier; joy.active = true;
        joy.ox = t.clientX; joy.oy = t.clientY;
        joyBase.style.display = 'block';
        joyBase.style.left = (joy.ox - JOY_R) + 'px';
        joyBase.style.top = (joy.oy - JOY_R) + 'px';
        joyStick.style.transform = 'translate(-50%,-50%)';
      } else if (look.id === null) {
        look.id = t.identifier; look.lx = t.clientX; look.ly = t.clientY;
      }
    }
    ev.preventDefault();
  }, { passive: false });

  touchLayer.addEventListener('touchmove', ev => {
    for (const t of ev.changedTouches) {
      if (t.identifier === joy.id) {
        let dx = t.clientX - joy.ox, dy = t.clientY - joy.oy;
        const len = Math.hypot(dx, dy);
        if (len > JOY_R) { dx = dx / len * JOY_R; dy = dy / len * JOY_R; }
        joy.x = dx / JOY_R; joy.y = dy / JOY_R;
        joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      } else if (t.identifier === look.id) {
        player.yaw -= (t.clientX - look.lx) * 0.0045;
        player.pitch = Math.max(-1.45, Math.min(1.45, player.pitch - (t.clientY - look.ly) * 0.0045));
        look.lx = t.clientX; look.ly = t.clientY;
      }
    }
    ev.preventDefault();
  }, { passive: false });

  const endTouch = ev => {
    for (const t of ev.changedTouches) {
      if (t.identifier === joy.id) {
        joy.id = null; joy.active = false; joy.x = joy.y = 0;
        joyBase.style.display = 'none';
      } else if (t.identifier === look.id) look.id = null;
    }
    ev.preventDefault();
  };
  touchLayer.addEventListener('touchend', endTouch, { passive: false });
  touchLayer.addEventListener('touchcancel', endTouch, { passive: false });

  const bindBtn = (id, down, up) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); down(); }, { passive: false });
    el.addEventListener('touchend', e => { e.preventDefault(); e.stopPropagation(); up && up(); }, { passive: false });
  };
  bindBtn('btn-fire', () => firing = true, () => firing = false);
  bindBtn('btn-fire-alt', () => firing = true, () => firing = false);
  bindBtn('btn-jump', () => jumpQueued = true);
  bindBtn('btn-reload', () => reload());
  bindBtn('btn-vehicle', () => toggleVehicle());
}

// ---------- Player movement ----------
function updatePlayer(dt) {
  if (!player.alive) return;
  // input vector (local)
  let ix = 0, iz = 0, sprint = false;
  if (isMobile) {
    ix = joy.x; iz = joy.y;
    sprint = joy.y < -0.92;                    // push fully forward = sprint (BF style)
  } else {
    if (keys['KeyW']) iz -= 1;
    if (keys['KeyS']) iz += 1;
    if (keys['KeyA']) ix -= 1;
    if (keys['KeyD']) ix += 1;
    const l = Math.hypot(ix, iz); if (l > 1) { ix /= l; iz /= l; }
    sprint = !!keys['ShiftLeft'] && iz < 0;
    if (keys['Space']) jumpQueued = true;
  }
  const speed = sprint ? 9.5 : 5.5;
  const sin = Math.sin(player.yaw), cos = Math.cos(player.yaw);
  // カメラ空間(前=-Z)→ワールドへの回転変換 (v0.1.1: 横向き時に前後が反転するバグを修正)
  const wx = (ix * cos + iz * sin) * speed;
  const wz = (iz * cos - ix * sin) * speed;

  // gravity & jump
  if (jumpQueued && player.onGround) { player.vel.y = 6.5; player.onGround = false; }
  jumpQueued = false;
  player.vel.y -= 18 * dt;

  // move with per-axis collision
  const nx = player.pos.x + wx * dt;
  if (!collides(nx, player.pos.z, player.radius)) player.pos.x = nx;
  const nz = player.pos.z + wz * dt;
  if (!collides(player.pos.x, nz, player.radius)) player.pos.z = nz;
  player.pos.y += player.vel.y * dt;
  if (player.pos.y <= player.eyeHeight) { player.pos.y = player.eyeHeight; player.vel.y = 0; player.onGround = true; }

  // camera
  camera.position.copy(player.pos);
  const moving = Math.hypot(wx, wz) > 0.5;
  if (moving && player.onGround) {
    bobT += dt * (sprint ? 13 : 9);
    camera.position.y += Math.sin(bobT) * 0.035;
  }
  camera.rotation.set(player.pitch, player.yaw, 0);
  if (shake > 0.01) {
    camera.position.x += (Math.random() - .5) * shake;
    camera.position.y += (Math.random() - .5) * shake;
  }

  // gun animation
  weapon.recoil = Math.max(0, weapon.recoil - dt * 8);
  weapon.spreadHeat = Math.max(0, weapon.spreadHeat - dt * 1.2);
  gunGroup.position.z = -0.55 + weapon.recoil * 0.06;
  gunGroup.rotation.x = weapon.recoil * 0.05;
  gunGroup.position.y = -0.26 + (moving ? Math.sin(bobT) * 0.012 : 0);
  if (weapon.reloading) gunGroup.rotation.x = -0.5 + Math.sin(weapon.reloadTimer * 3) * 0.1;

  // weapon logic
  weapon.cooldown -= dt;
  if (weapon.reloading) {
    weapon.reloadTimer -= dt;
    if (weapon.reloadTimer <= 0) {
      weapon.reloading = false; weapon.mag = weapon.magSize;
      ui.reloadHint.textContent = '';
      updateAmmoUI();
    }
  }
  if (firing) playerShoot();
  if (weapon.mag === 0 && !weapon.reloading) reload(); // auto reload
}

// ---------- UI ----------
const ui = {
  hpFill: document.getElementById('hp-fill'), hpText: document.getElementById('hp-text'),
  ammoMag: document.getElementById('ammo-mag'), reloadHint: document.getElementById('reload-hint'),
  weaponName: document.getElementById('weapon-name'),
  scoreVal: document.getElementById('score-val'), killsVal: document.getElementById('kills-val'),
  waveLabel: document.getElementById('wave-label'), enemyCount: document.getElementById('enemy-count'),
  waveBanner: document.getElementById('wave-banner'), vignette: document.getElementById('damage-vignette'),
  hitmarker: document.getElementById('hitmarker'), killfeed: document.getElementById('killfeed'),
  radar: document.getElementById('radar').getContext('2d'),
  vehicleBox: document.getElementById('vehicle-box'),
  vehicleName: document.getElementById('vehicle-name'),
  vehicleFill: document.getElementById('vehicle-fill'),
  vehicleSpeed: document.getElementById('vehicle-speed'),
  interactHint: document.getElementById('interact-hint'),
  btnVehicle: document.getElementById('btn-vehicle')
};
function updateHpUI() {
  ui.hpFill.style.width = (player.hp / player.maxHp * 100) + '%';
  ui.hpFill.style.background = player.hp > 40 ? 'linear-gradient(90deg,#3ddc84,#a7f3c8)' : 'linear-gradient(90deg,#e0483d,#f3a7a0)';
  ui.hpText.textContent = 'HP ' + Math.ceil(player.hp);
}
function updateAmmoUI() {
  if (curVehicle) return;
  ui.ammoMag.textContent = weapon.mag;
  ui.ammoMag.style.color = weapon.mag <= 5 ? '#ff6b5e' : '#fff';
}
function updateScoreUI() {
  ui.scoreVal.textContent = game.score;
  ui.killsVal.textContent = game.kills + ' KILLS';
}
let hitmarkerTO = null;
function showHitmarker() {
  ui.hitmarker.style.opacity = 1;
  clearTimeout(hitmarkerTO);
  hitmarkerTO = setTimeout(() => ui.hitmarker.style.opacity = 0, 90);
}
function addFeed(text) {
  const d = document.createElement('div');
  d.className = 'feed-item'; d.textContent = text;
  ui.killfeed.appendChild(d);
  setTimeout(() => d.remove(), 1250);
}
// 乗車ヒント表示 (0.2秒ごと)
let interactT = 0;
function updateInteractHint(dt) {
  interactT += dt;
  if (interactT < 0.2) return;
  interactT = 0;
  if (curVehicle) {
    ui.interactHint.style.display = 'none';
    if (isMobile) { ui.btnVehicle.style.display = 'flex'; ui.btnVehicle.textContent = '降りる'; }
    return;
  }
  const v = nearestVehicle();
  if (v) {
    if (isMobile) {
      ui.btnVehicle.style.display = 'flex'; ui.btnVehicle.textContent = '乗る';
      ui.interactHint.style.display = 'none';
    } else {
      ui.interactHint.textContent = 'E: ' + v.name + ' に乗る';
      ui.interactHint.style.display = 'block';
    }
  } else {
    ui.interactHint.style.display = 'none';
    if (isMobile) ui.btnVehicle.style.display = 'none';
  }
}
function drawRadar() {
  const g = ui.radar, S = 104, C = S / 2, RANGE = 70;
  g.clearRect(0, 0, S, S);
  g.strokeStyle = 'rgba(120,200,255,.25)';
  g.beginPath(); g.arc(C, C, 34, 0, 7); g.stroke();
  g.beginPath(); g.arc(C, C, 17, 0, 7); g.stroke();
  const toRadar = (wx, wz) => {
    const dx = wx - player.pos.x, dz = wz - player.pos.z;
    const rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
    const rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
    return [C + rx / RANGE * C, C + rz / RANGE * C];
  };
  // 車両 (緑の四角)
  for (const v of vehicles) {
    if (!v.alive || v === curVehicle) continue;
    const [px, pz] = toRadar(v.obj.position.x, v.obj.position.z);
    if (Math.hypot(px - C, pz - C) < C - 5) {
      g.fillStyle = '#5aff9c';
      g.fillRect(px - 3, pz - 3, 6, 6);
    }
  }
  // 敵
  for (const e of enemies) {
    if (!e.alive) continue;
    const [px, pz] = toRadar(e.obj.position.x, e.obj.position.z);
    if (Math.hypot(px - C, pz - C) < C - 4) {
      g.fillStyle = '#ff4438';
      g.beginPath(); g.arc(px, pz, 3, 0, 7); g.fill();
    }
  }
  // player arrow
  g.fillStyle = '#9fd4ff';
  g.beginPath(); g.moveTo(C, C - 6); g.lineTo(C - 4, C + 4); g.lineTo(C + 4, C + 4); g.closePath(); g.fill();
}

// ---------- Game flow ----------
function resetGame() {
  for (const e of enemies) scene.remove(e.obj);
  enemies.length = 0; enemyHitMeshes.length = 0;
  clearEffects();
  for (const s of shells) { s.ttl = 0; s.m.visible = false; }
  if (curVehicle) { curVehicle = null; gunGroup.visible = true; stopEngine(); }
  ui.vehicleBox.style.display = 'none';
  ui.weaponName.textContent = 'M4A1 CARBINE';
  spawnVehicles();
  Object.assign(player, { hp: 100, alive: true, yaw: 0, pitch: 0, lastDamageTime: -99, onGround: true });
  player.pos.set(0, 1.7, 8); player.vel.set(0, 0, 0);
  Object.assign(weapon, { mag: 30, reloading: false, cooldown: 0, recoil: 0, spreadHeat: 0 });
  game.score = 0; game.kills = 0; game.waveClearTimer = 0; firing = false;
  shake = 0;
  ui.vignette.style.opacity = 0; ui.reloadHint.textContent = '';
  updateHpUI(); updateAmmoUI(); updateScoreUI();
  startWave(1);
  game.running = true;
}

document.getElementById('start-btn').addEventListener('click', () => {
  initAudio();
  document.getElementById('start-screen').style.display = 'none';
  resetGame();
  if (!isMobile) canvas.requestPointerLock();
});
document.getElementById('restart-btn').addEventListener('click', () => {
  initAudio();
  document.getElementById('gameover-screen').style.display = 'none';
  resetGame();
  if (!isMobile) canvas.requestPointerLock();
});

// ---------- Main loop ----------
let lastT = performance.now(), elapsed = 0, bobT = 0, radarT = 0, shake = 0;
function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;
  if (game.running) {
    elapsed += dt;
    shake = Math.max(0, shake - dt * 1.6);
    if (curVehicle) {
      updateVehicle(dt);
      // HP regen は乗車中も有効
      if (player.hp < player.maxHp && elapsed - player.lastDamageTime > 4) {
        player.hp = Math.min(player.maxHp, player.hp + 12 * dt);
        if (player.hp > 30) ui.vignette.style.opacity = 0;
        updateHpUI();
      }
      muzzleFlash.material.opacity = 0;
      muzzleLight.intensity = 0;
    } else {
      updatePlayer(dt);
      // HP regen (Battlefield style)
      if (player.hp < player.maxHp && elapsed - player.lastDamageTime > 4) {
        player.hp = Math.min(player.maxHp, player.hp + 12 * dt);
        if (player.hp > 30) ui.vignette.style.opacity = 0;
        updateHpUI();
      }
      muzzleFlash.material.opacity = Math.max(0, muzzleFlash.material.opacity - dt * 18);
      muzzleLight.intensity = Math.max(0, muzzleLight.intensity - dt * 25);
    }
    updateEnemies(dt);
    updateShells(dt);
    updateEffects(dt);
    updateInteractHint(dt);
    radarT += dt;
    if (radarT > 0.12) { radarT = 0; drawRadar(); }
  }
  if (!ctxLost) {
    try { renderer.render(scene, camera); } catch (err) { /* コンテキスト消失中は無視 */ }
  }
}
updateHpUI(); updateAmmoUI(); updateScoreUI();
requestAnimationFrame(loop);
</script>
