<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>STEEL FRONT v0.2 - Conquest</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
  html,body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Segoe UI',Meiryo,sans-serif; touch-action:none; }
  #game-canvas { position:fixed; inset:0; }

  /* ===== HUD ===== */
  #hud { position:fixed; inset:0; pointer-events:none; z-index:10; }
  #crosshair { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:24px; height:24px; }
  #crosshair span { position:absolute; background:rgba(255,255,255,.85); box-shadow:0 0 3px rgba(0,0,0,.8); }
  #crosshair .ch-t { left:11px; top:0; width:2px; height:7px; }
  #crosshair .ch-b { left:11px; bottom:0; width:2px; height:7px; }
  #crosshair .ch-l { left:0; top:11px; width:7px; height:2px; }
  #crosshair .ch-r { right:0; top:11px; width:7px; height:2px; }
  #hitmarker { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) rotate(45deg); width:26px; height:26px; opacity:0; transition:opacity .1s; }
  #hitmarker span { position:absolute; background:#ff3b30; box-shadow:0 0 4px #ff3b30; }
  #hitmarker .hm1 { left:12px; top:0; width:2px; height:8px; }
  #hitmarker .hm2 { left:12px; bottom:0; width:2px; height:8px; }
  #hitmarker .hm3 { left:0; top:12px; width:8px; height:2px; }
  #hitmarker .hm4 { right:0; top:12px; width:8px; height:2px; }

  #damage-vignette { position:absolute; inset:0; background:radial-gradient(ellipse at center, transparent 45%, rgba(200,0,0,.55) 100%); opacity:0; transition:opacity .15s; }

  /* コンクエストHUD: チケット + 拠点ストリップ */
  #top-bar { position:absolute; top:calc(8px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%); text-align:center; color:#fff; }
  #tickets-row { display:flex; align-items:center; gap:10px; justify-content:center; }
  .tk { font-size:19px; font-weight:800; text-shadow:0 1px 3px #000; min-width:44px; }
  #t-blue { color:#6db4ff; text-align:right; }
  #t-red { color:#ff6b5e; text-align:left; }
  #flags-strip { display:flex; gap:5px; }
  .flag-ic { width:22px; height:22px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; background:rgba(255,255,255,.16); color:#fff; border:1px solid rgba(255,255,255,.4); text-shadow:0 1px 2px #000; transition:background .3s; }
  .flag-ic.f-blue { background:rgba(45,110,220,.9); border-color:rgba(140,190,255,.8); }
  .flag-ic.f-red { background:rgba(205,50,40,.9); border-color:rgba(255,150,140,.8); }
  .flag-ic.f-hot { animation:flagBlink .8s infinite; }
  @keyframes flagBlink { 50% { opacity:.45; } }
  #mode-label { font-size:10px; letter-spacing:3px; color:#9fd4ff; margin-top:2px; text-shadow:0 0 6px rgba(0,120,255,.8); }

  #cap-box { position:absolute; top:19%; left:50%; transform:translateX(-50%); display:none; text-align:center; color:#fff; }
  #cap-label { font-size:15px; font-weight:800; text-shadow:0 1px 3px #000; letter-spacing:2px; }
  #cap-bar { width:190px; height:9px; background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.45); border-radius:4px; overflow:hidden; margin-top:4px; }
  #cap-fill { height:100%; width:50%; background:#6db4ff; transition:width .15s linear; }

  #score-box { position:absolute; top:calc(10px + env(safe-area-inset-top)); right:calc(12px + env(safe-area-inset-right)); text-align:right; color:#fff; text-shadow:0 1px 3px #000; }
  #score-box .score { font-size:18px; font-weight:700; color:#ffd257; }
  #score-box .kills { font-size:11px; color:rgba(255,255,255,.8); }

  #radar { position:absolute; top:calc(10px + env(safe-area-inset-top)); left:calc(12px + env(safe-area-inset-left)); width:112px; height:112px; border-radius:50%; border:2px solid rgba(120,200,255,.5); background:rgba(0,20,35,.55); box-shadow:0 0 12px rgba(0,0,0,.5); }

  #bottom-left { position:absolute; left:calc(14px + env(safe-area-inset-left)); bottom:calc(14px + env(safe-area-inset-bottom)); color:#fff; }
  #hp-bar { width:170px; height:9px; background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.35); border-radius:4px; overflow:hidden; }
  #hp-fill { height:100%; width:100%; background:linear-gradient(90deg,#3ddc84,#a7f3c8); transition:width .2s; }
  #hp-text { font-size:12px; margin-top:3px; text-shadow:0 1px 2px #000; font-weight:600; }

  #vehicle-box { display:none; margin-bottom:8px; }
  #vehicle-name { font-size:11px; letter-spacing:2px; color:#8affc1; text-shadow:0 1px 2px #000; font-weight:700; }
  #vehicle-bar { width:170px; height:9px; background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.35); border-radius:4px; overflow:hidden; margin-top:2px; }
  #vehicle-fill { height:100%; width:100%; background:linear-gradient(90deg,#3dc9dc,#a7e9f3); transition:width .2s; }
  #vehicle-speed { font-size:11px; color:rgba(255,255,255,.75); margin-top:2px; text-shadow:0 1px 2px #000; }

  #ammo-box { position:absolute; right:calc(14px + env(safe-area-inset-right)); bottom:calc(14px + env(safe-area-inset-bottom)); text-align:right; color:#fff; text-shadow:0 1px 3px #000; }
  #ammo-mag { font-size:30px; font-weight:800; line-height:1; }
  #ammo-reserve { font-size:14px; color:rgba(255,255,255,.7); }
  #weapon-name { font-size:11px; letter-spacing:2px; color:#9fd4ff; }
  #reload-hint { font-size:11px; color:#ffd257; height:14px; }

  #interact-hint { position:absolute; left:50%; bottom:26%; transform:translateX(-50%); font-size:14px; font-weight:700; color:#8affc1; text-shadow:0 0 8px rgba(0,255,140,.6); white-space:nowrap; display:none; }

  #killfeed { position:absolute; top:32%; left:50%; transform:translateX(-50%); text-align:center; }
  .feed-item { color:#ffd257; font-size:15px; font-weight:700; text-shadow:0 0 8px rgba(255,150,0,.7); animation:feedUp 1.4s ease-out forwards; }
  .feed-item.blue { color:#8fc4ff; text-shadow:0 0 8px rgba(60,140,255,.8); }
  .feed-item.red { color:#ff8a80; text-shadow:0 0 8px rgba(255,60,40,.8); }
  @keyframes feedUp { 0%{opacity:1; transform:translateY(0);} 100%{opacity:0; transform:translateY(-30px);} }

  #wave-banner { position:absolute; top:25%; left:50%; transform:translateX(-50%); font-size:28px; font-weight:900; letter-spacing:6px; color:#9fd4ff; text-shadow:0 0 20px rgba(0,140,255,.9); opacity:0; transition:opacity .4s; white-space:nowrap; }

  /* リスポーン待機オーバーレイ */
  #respawn-screen { position:fixed; inset:0; z-index:40; display:none; flex-direction:column; align-items:center; justify-content:center; background:radial-gradient(ellipse at center, rgba(40,0,0,.5), rgba(20,0,0,.8)); color:#fff; text-align:center; }
  #respawn-screen h2 { font-size:32px; font-weight:900; letter-spacing:6px; color:#ff6b5e; text-shadow:0 0 18px rgba(255,60,40,.9); margin-bottom:12px; }
  #respawn-timer { font-size:20px; color:#ffd257; }

  #ctx-lost { position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.75); color:#ffd257; font-size:15px; text-align:center; line-height:1.8; }

  /* ===== Touch controls ===== */
  #touch-layer { position:fixed; inset:0; z-index:20; display:none; }
  #joystick-base { position:absolute; width:110px; height:110px; border-radius:50%; border:2px solid rgba(255,255,255,.35); background:rgba(255,255,255,.08); display:none; }
  #joystick-stick { position:absolute; left:50%; top:50%; width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,.45); transform:translate(-50%,-50%); box-shadow:0 0 8px rgba(0,0,0,.4); }
  .tbtn { position:absolute; border-radius:50%; border:2px solid rgba(255,255,255,.4); background:rgba(20,30,40,.45); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; text-shadow:0 1px 2px #000; backdrop-filter:blur(2px); }
  .tbtn:active { background:rgba(120,200,255,.35); }
  #btn-fire { width:88px; height:88px; right:calc(26px + env(safe-area-inset-right)); bottom:calc(110px + env(safe-area-inset-bottom)); font-size:13px; border-color:rgba(255,120,100,.6); background:rgba(120,30,20,.4); }
  #btn-fire-alt { width:58px; height:58px; right:calc(140px + env(safe-area-inset-right)); bottom:calc(70px + env(safe-area-inset-bottom)); font-size:11px; border-color:rgba(255,120,100,.5); background:rgba(120,30,20,.35); }
  #btn-jump { width:56px; height:56px; right:calc(30px + env(safe-area-inset-right)); bottom:calc(220px + env(safe-area-inset-bottom)); font-size:11px; }
  #btn-reload { width:56px; height:56px; right:calc(120px + env(safe-area-inset-right)); bottom:calc(190px + env(safe-area-inset-bottom)); font-size:11px; }
  #btn-vehicle { width:64px; height:64px; right:calc(38px + env(safe-area-inset-right)); bottom:calc(300px + env(safe-area-inset-bottom)); font-size:11px; border-color:rgba(120,255,180,.6); background:rgba(20,90,50,.45); display:none; }

  /* ===== Screens ===== */
  .screen { position:fixed; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(160deg,#06131f 0%,#0b2438 55%,#123c55 100%); color:#fff; text-align:center; padding:20px; }
  .screen h1 { font-size:44px; font-weight:900; letter-spacing:10px; color:#cfe9ff; text-shadow:0 0 25px rgba(0,150,255,.9); margin-bottom:6px; }
  .screen .sub { font-size:13px; letter-spacing:4px; color:#7fb8e0; margin-bottom:28px; }
  .big-btn { pointer-events:auto; padding:14px 60px; font-size:18px; font-weight:800; letter-spacing:4px; color:#06131f; background:linear-gradient(180deg,#9fd4ff,#4da3e0); border:none; border-radius:6px; cursor:pointer; box-shadow:0 0 20px rgba(80,180,255,.5); }
  .big-btn:active { transform:scale(.96); }
  .howto { margin-top:26px; font-size:12px; line-height:1.9; color:rgba(255,255,255,.75); }
  #gameover-screen { display:none; background:rgba(5,5,12,.9); }
  #gameover-title { }
  #final-stats { font-size:16px; margin-bottom:26px; color:#ffd257; line-height:1.8; }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<!-- ===== HUD ===== -->
<section id="hud" aria-hidden="true">
  <div id="damage-vignette"></div>
  <div id="crosshair"><span class="ch-t"></span><span class="ch-b"></span><span class="ch-l"></span><span class="ch-r"></span></div>
  <div id="hitmarker"><span class="hm1"></span><span class="hm2"></span><span class="hm3"></span><span class="hm4"></span></div>
  <div id="top-bar">
    <div id="tickets-row">
      <span class="tk" id="t-blue">150</span>
      <div id="flags-strip"></div>
      <span class="tk" id="t-red">150</span>
    </div>
    <div id="mode-label">CONQUEST 10 vs 10</div>
  </div>
  <div id="cap-box"><div id="cap-label">B 占領中</div><div id="cap-bar"><div id="cap-fill"></div></div></div>
  <div id="score-box"><div class="score" id="score-val">0</div><div class="kills" id="kills-val">0 KILLS</div></div>
  <canvas id="radar" width="112" height="112"></canvas>
  <div id="bottom-left">
    <div id="vehicle-box">
      <div id="vehicle-name">JEEP</div>
      <div id="vehicle-bar"><div id="vehicle-fill"></div></div>
      <div id="vehicle-speed">0 km/h</div>
    </div>
    <div id="hp-bar"><div id="hp-fill"></div></div>
    <div id="hp-text">HP 100</div>
  </div>
  <div id="ammo-box">
    <div id="weapon-name">M4A1 CARBINE</div>
    <div><span id="ammo-mag">30</span><span id="ammo-reserve"> / ∞</span></div>
    <div id="reload-hint"></div>
  </div>
  <div id="interact-hint"></div>
  <div id="killfeed"></div>
  <div id="wave-banner">CONQUEST</div>
</section>

<!-- リスポーン待機 -->
<div id="respawn-screen">
  <h2>戦死</h2>
  <div id="respawn-timer">再出撃まで 5</div>
</div>

<div id="ctx-lost">描画コンテキストを復旧中...<br>数秒待っても直らない場合は再読み込みしてください</div>

<!-- ===== Touch controls ===== -->
<div id="touch-layer">
  <div id="joystick-base"><div id="joystick-stick"></div></div>
  <button class="tbtn" id="btn-fire">FIRE</button>
  <button class="tbtn" id="btn-fire-alt">FIRE</button>
  <button class="tbtn" id="btn-jump">JUMP</button>
  <button class="tbtn" id="btn-reload">RELOAD</button>
  <button class="tbtn" id="btn-vehicle">乗る</button>
</div>

<!-- ===== Start screen ===== -->
<section class="screen" id="start-screen">
  <h1>STEEL FRONT</h1>
  <div class="sub">CONQUEST — 10 vs 10 拠点占領戦</div>
  <button class="big-btn" id="start-btn">出撃する</button>
  <div class="howto" id="howto-text"></div>
</section>

<!-- ===== Match end screen ===== -->
<section class="screen" id="gameover-screen">
  <h1 id="gameover-title">勝利</h1>
  <div id="final-stats"></div>
  <button class="big-btn" id="restart-btn">再出撃</button>
</section>

<script>
'use strict';
/* =========================================================
   STEEL FRONT — Mobile 3D FPS (single file, Three.js)
   v0.2: コンクエスト(拠点占領)モード 10vs10 /
         高低差のある大型マップ (300m x 300m)
   ---------------------------------------------------------
   - 5つの占領拠点 (A〜E) + 両軍HQ
   - チケット制: 拠点過半数保持で敵チケットが減少 / 戦死で-1
   - 味方AI 9体 + 敵AI 10体 (拠点への移動・交戦・占領を行う)
   - ハイトフィールド地形 (丘・高台・外周の山) と地形追従の道路
   - 市街地 / 村 / 倉庫地区 / 監視塔 / 岩場などの地区
   ========================================================= */

// ---------- Device detection ----------
const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) ||
                 (navigator.maxTouchPoints > 1 && 'ontouchstart' in window);

document.getElementById('howto-text').innerHTML = isMobile
  ? 'A〜Eの拠点を占領してチケットで勝利せよ!<br>左画面ドラッグ:移動(前いっぱいでダッシュ)<br>右画面ドラッグ:視点 / FIRE:射撃 / 乗り物ボタンで搭乗'
  : 'A〜Eの拠点を占領してチケットで勝利せよ!<br>WASD:移動 / マウス:視点 / 左クリック:射撃<br>Shift:ダッシュ / Space:ジャンプ / R:リロード / E:乗り物';

// ---------- Core three.js setup ----------
const canvas = document.getElementById('game-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMobile, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.25 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = !isMobile;
renderer.shadowMap.type = THREE.PCFShadowMap;

// --- WebGL context-loss recovery ---
let ctxLost = false;
const ctxLostEl = document.getElementById('ctx-lost');
canvas.addEventListener('webglcontextlost', e => {
  e.preventDefault();
  ctxLost = true;
  ctxLostEl.style.display = 'flex';
}, false);
canvas.addEventListener('webglcontextrestored', () => {
  ctxLost = false;
  ctxLostEl.style.display = 'none';
}, false);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xc3d2de, 110, 420);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1200);
camera.rotation.order = 'YXZ';

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Lights ----------
scene.add(new THREE.HemisphereLight(0xd8e8f4, 0x50584a, 0.95));
const sun = new THREE.DirectionalLight(0xfff2d8, 1.05);
sun.position.set(90, 130, 45);
if (!isMobile) {
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  sun.shadow.camera.left = -160; sun.shadow.camera.right = 160;
  sun.shadow.camera.top = 160; sun.shadow.camera.bottom = -160;
  sun.shadow.camera.far = 400;
}
scene.add(sun);

/* =========================================================
   Terrain — ハイトフィールド地形 (v0.2)
   丘・高台・外周の山を解析関数で定義し、メッシュと当たり判定
   の両方で同じ terrainHeight() を使用する
   ========================================================= */
const WORLD = 150;                 // playable half-size (300m x 300m)

// なだらかな丘 (ガウス型) の定義 [x, z, 半径, 高さ]
const HILLS = [
  [-95, -85, 55, 14],    // 北西の大きな丘 (拠点A)
  [100, 95, 60, 16],     // 南東の高地 (拠点E)
  [95, -100, 45, 10],    // 北東の丘
  [-100, 105, 42, 9],    // 南西の丘
  [0, 0, 30, 5],         // 中央のゆるい盛り上がり (拠点C)
  [-45, 60, 25, 6],      // 南西寄りの小丘
  [55, -50, 22, 5]       // 北東寄りの小丘
];
function terrainHeight(x, z) {
  let h = 0;
  // 丘 (滑らかに合成)
  for (const [hx, hz, r, hh] of HILLS) {
    const d2 = (x - hx) * (x - hx) + (z - hz) * (z - hz);
    const rr = r * r;
    if (d2 < rr) {
      const t = 1 - d2 / rr;
      h += hh * t * t;               // 滑らかな山型
    }
  }
  // 外周の山 (プレイエリア外へ向かって上がる)
  const edge = Math.max(Math.abs(x), Math.abs(z));
  if (edge > WORLD - 8) h += (edge - (WORLD - 8)) * 1.4;
  // 細かい起伏 (低周波ノイズ風)
  h += Math.sin(x * 0.045) * Math.cos(z * 0.05) * 1.1
     + Math.sin(x * 0.11 + 3) * Math.sin(z * 0.09 + 1) * 0.5;
  return h;
}
// 道路・拠点まわりを平らに補正するための「平地パッチ」
// [x, z, 半径, 目標高さ(nullなら中心の高さ)]
const FLATS = [];
function flattenAt(x, z, r) { FLATS.push([x, z, r, terrainHeight(x, z)]); }
function terrainH(x, z) {
  let h = terrainHeight(x, z);
  for (const [fx, fz, fr, fh] of FLATS) {
    const d = Math.hypot(x - fx, z - fz);
    if (d < fr) {
      const t = Math.min(1, (fr - d) / (fr * 0.45)); // 端はブレンド
      h = h * (1 - t) + fh * t;
    }
  }
  return h;
}

// ---------- Procedural textures ----------
function makeCanvasTexture(size, painter, repeatX = 1, repeatY = 1) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  painter(c.getContext('2d'), size);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  return tex;
}
const groundTex = makeCanvasTexture(256, (g, s) => {
  g.fillStyle = '#6f6d54'; g.fillRect(0, 0, s, s);
  for (let i = 0; i < 900; i++) {
    g.fillStyle = `rgba(${70 + Math.random() * 50 | 0},${78 + Math.random() * 45 | 0},${45 + Math.random() * 35 | 0},.55)`;
    g.fillRect(Math.random() * s, Math.random() * s, 2 + Math.random() * 4, 2 + Math.random() * 4);
  }
  for (let i = 0; i < 28; i++) {
    const x = Math.random() * s, y = Math.random() * s, r = 8 + Math.random() * 18;
    const gr = g.createRadialGradient(x, y, 0, x, y, r);
    gr.addColorStop(0, 'rgba(84,110,58,.55)'); gr.addColorStop(1, 'rgba(84,110,58,0)');
    g.fillStyle = gr; g.beginPath(); g.arc(x, y, r, 0, 7); g.fill();
  }
}, 56, 56);
const roadTex = makeCanvasTexture(256, (g, s) => {
  g.fillStyle = '#3c3e42'; g.fillRect(0, 0, s, s);
  for (let i = 0; i < 500; i++) {
    g.fillStyle = `rgba(${50 + Math.random() * 40 | 0},${52 + Math.random() * 40 | 0},${55 + Math.random() * 40 | 0},.4)`;
    g.fillRect(Math.random() * s, Math.random() * s, 2, 2);
  }
  g.fillStyle = 'rgba(230,220,180,.85)';
  for (let x = 8; x < s; x += 64) g.fillRect(x, s / 2 - 3, 34, 6);
  g.fillStyle = 'rgba(220,220,220,.5)';
  g.fillRect(0, 8, s, 4); g.fillRect(0, s - 12, s, 4);
}, 1, 1);
function facadeTex(base, winLit) {
  return makeCanvasTexture(256, (g, s) => {
    g.fillStyle = base; g.fillRect(0, 0, s, s);
    for (let i = 0; i < 250; i++) {
      g.fillStyle = 'rgba(0,0,0,.06)';
      g.fillRect(Math.random() * s, Math.random() * s, 3, 3);
    }
    for (let y = 20; y < s - 30; y += 52) {
      for (let x = 16; x < s - 30; x += 46) {

// 道路セグメント定義 [x1,z1,x2,z2] — レンダリングと「道路上か」判定に使用
const ROADS = [
  [HQ_BLUE.x, HQ_BLUE.z, -75, 55],    // 青HQ → B
  [-75, 55, 0, 0],                     // B → C
  [0, 0, 80, -60],                     // C → D
  [80, -60, HQ_RED.x, HQ_RED.z],      // D → 赤HQ
  [-95, -85, 0, 0],                    // A → C
  [0, 0, 100, 95],                     // C → E
  [-95, -85, -75, 55],                 // A → B
  [80, -60, 100, 95]                   // D → E
];
function onRoad(x, z) {
  for (const [x1, z1, x2, z2] of ROADS) {
    const dx = x2 - x1, dz = z2 - z1;
    const len2 = dx * dx + dz * dz;
    let t = ((x - x1) * dx + (z - z1) * dz) / len2;
    t = Math.max(0, Math.min(1, t));
    const px = x1 + dx * t, pz = z1 + dz * t;
    if (Math.hypot(x - px, z - pz) < 5.5) return true;
  }
  return false;
}

{
  const SEG = 100;

  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  // 頂点カラー: 高さ・道路で色分け (草/土/岩/道路)
  const colors = new Float32Array(pos.count * 3);
  const cGrass = new THREE.Color(0x6d7a4e), cDirt = new THREE.Color(0x7a7050),
        cRock = new THREE.Color(0x777872), cRoad = new THREE.Color(0x46484c),
        cGrass2 = new THREE.Color(0x5d6f45);
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    const h = terrainH(x, z);
    pos.setY(i, h);
    let c;
    if (onRoad(x, z)) c = cRoad;
    else if (h > 13) c = cRock;
    else if (h > 7) c = cDirt;
    else c = ((Math.sin(x * 0.2) + Math.cos(z * 0.23)) > 0.4) ? cGrass2 : cGrass;
    colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.computeVertexNormals();
  const ground = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ vertexColors: true, map: groundTex }));
  ground.receiveShadow = !isMobile;
  scene.add(ground);
}

const obstacles = [];             // AABB list {minX,maxX,minZ,maxZ,y0,h} (y0=底面, h=上面の絶対高さ)
const solidMeshes = [];           // for line-of-sight raycasts

function addBox(x, z, w, h, d, material, rotY = 0, yBase = null, solid = true) {
  const gy = yBase === null ? terrainH(x, z) : yBase;
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
  m.position.set(x, gy + h / 2, z);
  m.rotation.y = rotY;
  m.castShadow = m.receiveShadow = !isMobile;
  scene.add(m);
  if (solid) {
    const rw = Math.abs(Math.sin(rotY)) > 0.7 ? d : w, rd = Math.abs(Math.sin(rotY)) > 0.7 ? w : d;
    obstacles.push({ minX: x - rw / 2, maxX: x + rw / 2, minZ: z - rd / 2, maxZ: z + rd / 2, y0: gy, h: gy + h });
    solidMeshes.push(m);
  }
  return m;
}

// === 木 (道路・拠点を避けてランダム + 固定) ===
{
  const trunkGeo = new THREE.CylinderGeometry(0.22, 0.34, 2.4, 6);
  const leafGeo1 = new THREE.ConeGeometry(1.9, 2.6, 7);
  const leafGeo2 = new THREE.ConeGeometry(1.4, 2.2, 7);
  let placed = 0, tries = 0;
  while (placed < 42 && tries < 300) {
    tries++;
    const x = (Math.random() * 2 - 1) * (WORLD - 12);
    const z = (Math.random() * 2 - 1) * (WORLD - 12);
    if (onRoad(x, z)) continue;
    let nearFlag = false;
    for (const f of flags) if (Math.hypot(x - f.x, z - f.z) < 16) { nearFlag = true; break; }
    if (nearFlag || Math.hypot(x - HQ_BLUE.x, z - HQ_BLUE.z) < 18 || Math.hypot(x - HQ_RED.x, z - HQ_RED.z) < 18) continue;
    const g = new THREE.Group();
    const trunk = new THREE.Mesh(trunkGeo, matTrunk); trunk.position.y = 1.2;
    const l1 = new THREE.Mesh(leafGeo1, Math.random() < .5 ? matLeaf : matLeaf2); l1.position.y = 3.3;
    const l2 = new THREE.Mesh(leafGeo2, matLeaf2); l2.position.y = 4.6;
    trunk.castShadow = l1.castShadow = !isMobile;
    g.add(trunk, l1, l2);
    const s = 0.8 + Math.random() * 0.8;
    g.scale.setScalar(s);
    const gy = terrainH(x, z);
    g.position.set(x, gy, z);
    scene.add(g);

function createSoldier(team, x, z) {

// AI: 目標拠点を選ぶ (未確保 or 争奪中 or 最寄り)
function pickFlagFor(s) {
  let best = null, bestScore = -Infinity;
  for (const f of flags) {
    const d = Math.hypot(f.x - s.obj.position.x, f.z - s.obj.position.z);
    let score = -d * 0.02;
    if (f.own !== s.team) score += 4;                // 敵/中立拠点を優先
    if (f.own === 0) score += 1.5;                   // 中立はさらに優先
    // 同じ拠点に味方が集中しすぎないように分散
    let allies = 0;
    for (const o of soldiers) {
      if (o !== s && o.alive && o.team === s.team && o.targetFlag === f) allies++;
    }
    score -= allies * 0.9;
    score += Math.random() * 1.2;
    if (score > bestScore) { bestScore = score; best = f; }
  }
  return best;
}

// AI: 最も近い視認可能な敵ターゲットを探す (プレイヤー含む)
function findEnemyTarget(s) {
  let best = null, bd = 60;
  // プレイヤー (敵チームのAIのみ)
  if (s.team === -1 && player.alive) {
    const pd = Math.hypot(player.pos.x - s.obj.position.x, player.pos.z - s.obj.position.z);
    if (pd < bd) { bd = pd; best = { kind: 'player' }; }
  }
  for (const o of soldiers) {
    if (!o.alive || o.team === s.team) continue;
    const d = Math.hypot(o.obj.position.x - s.obj.position.x, o.obj.position.z - s.obj.position.z);
    if (d < bd) { bd = d; best = { kind: 'soldier', s: o }; }
  }
  // 敵AIは搭乗中の車両も狙う
  if (s.team === -1 && curVehicle) {
    const vd = Math.hypot(curVehicle.obj.position.x - s.obj.position.x, curVehicle.obj.position.z - s.obj.position.z);
    if (vd < bd + 10) best = { kind: 'vehicle' };
  }
  return best;
}
function targetPosOf(t) {
  if (!t) return null;
  if (t.kind === 'player') return player.pos.clone();
  if (t.kind === 'vehicle' && curVehicle) return curVehicle.obj.position.clone().setY(curVehicle.obj.position.y + 1.4);
  if (t.kind === 'soldier') return t.s.obj.position.clone().setY(t.s.obj.position.y + 1.4);
  return null;
}
function targetAlive(t) {
  if (!t) return false;
  if (t.kind === 'player') return player.alive && !curVehicle;
  if (t.kind === 'vehicle') return !!curVehicle;
  if (t.kind === 'soldier') return t.s.alive;
  return false;
}

function updateSoldiers(dt) {
  for (let i = soldiers.length - 1; i >= 0; i--) {
    const s = soldiers[i];
    if (!s.alive) {
      s.deathT += dt;
      s.obj.rotation.x = Math.min(s.deathT * 4, Math.PI / 2);
      if (s.deathT > 2.4) {
        // リスポーン (チケットがあれば HQ から再出撃)
        const tk = s.team === 1 ? game.ticketsBlue : game.ticketsRed;
        if (tk > 0 && game.running) {
          const hq = s.team === 1 ? HQ_BLUE : HQ_RED;
          const rx = hq.x + (Math.random() - .5) * 14, rz = hq.z + (Math.random() - .5) * 14;
          s.obj.position.set(rx, terrainH(rx, rz), rz);
          s.obj.rotation.x = 0;
          s.hp = 100; s.alive = true; s.deathT = 0;
          s.targetFlag = null; s.engageTarget = null; s.aimT = 0;
          s.shootCd = 1 + Math.random();
        } else {
          s.obj.visible = false; // チケット切れは復活しない
        }
      }
      continue;
    }
    const sp = s.obj.position;

    // ---- 思考: 目標拠点の再選定 ----
    s.thinkT -= dt;
    if (s.thinkT <= 0) {
      s.thinkT = 2.5 + Math.random() * 2;
      if (!s.targetFlag || (s.targetFlag.own === s.team && Math.random() < 0.6)) {
        s.targetFlag = pickFlagFor(s);
      }
    }

    // ---- 交戦相手の探索 ----
    s.engageT -= dt;
    if (s.engageT <= 0) {
      s.engageT = 0.5 + Math.random() * 0.4;
      if (!targetAlive(s.engageTarget)) s.engageTarget = findEnemyTarget(s);
    }
    const tgt = targetAlive(s.engageTarget) ? s.engageTarget : null;
    const tPos = targetPosOf(tgt);
    const tDist = tPos ? Math.hypot(tPos.x - sp.x, tPos.z - sp.z) : Infinity;

    // ---- 視線チェック (間引き) ----
    s.losT -= dt;
    if (s.losT <= 0) {
      s.losT = 0.25 + Math.random() * 0.15;
      if (tPos && tDist < 80) {
        const eye = new THREE.Vector3(sp.x, sp.y + 1.6, sp.z);
        s.hasLos = hasLineOfSight(eye, tPos);
      } else s.hasLos = false;
    }

    // ---- 移動先の決定 ----
    let destX, destZ, wantDist = 0;
    if (tgt && s.hasLos && tDist < 45) {
      // 交戦: 距離を保ちつつストレイフ
      destX = tPos.x; destZ = tPos.z; wantDist = 13;
    } else if (s.targetFlag) {
      destX = s.targetFlag.x; destZ = s.targetFlag.z; wantDist = FLAG_R * 0.5;
    } else { destX = sp.x; destZ = sp.z; }

    const dx = destX - sp.x, dz = destZ - sp.z;
    const dist = Math.hypot(dx, dz) || 0.001;

    // 向き: 交戦中はターゲット、それ以外は進行方向
    if (tgt && s.hasLos) s.obj.rotation.y = Math.atan2(tPos.x - sp.x, tPos.z - sp.z);
    else if (dist > 1) s.obj.rotation.y = Math.atan2(dx, dz);

    s.strafeT -= dt;
    if (s.strafeT <= 0) { s.strafeT = 1.5 + Math.random() * 2; s.strafeDir = Math.random() < .5 ? -1 : 1; }
    let mvx = 0, mvz = 0;
    if (dist > wantDist + 2) { mvx = dx / dist; mvz = dz / dist; }
    else if (tgt && s.hasLos && dist < 7) { mvx = -dx / dist * .6; mvz = -dz / dist * .6; }
    else if (tgt && s.hasLos) { mvx = -dz / dist * s.strafeDir * .7; mvz = dx / dist * s.strafeDir * .7; }
    else if (dist > wantDist * 0.5) { mvx = dx / dist * 0.5; mvz = dz / dist * 0.5; }

    // 障害物回避
    if (s.avoidT > 0) {
      s.avoidT -= dt;
      const ax = -mvz * s.avoidDir, az = mvx * s.avoidDir;
      mvx = ax; mvz = az;
    } else if (mvx || mvz) {
      const px = sp.x + mvx * s.speed * dt * 8, pz = sp.z + mvz * s.speed * dt * 8;
      if (collidesAt(px, pz, 0.4, sp.y)) {
        s.avoidDir = Math.random() < .5 ? -1 : 1;
        if (collidesAt(sp.x - mvz * s.avoidDir * 1.5, sp.z + mvx * s.avoidDir * 1.5, 0.4, sp.y)) s.avoidDir *= -1;
        s.avoidT = 0.5 + Math.random() * 0.5;
      }
    }

    // 目的地が遠く非交戦ならダッシュ (広いマップでの移動時間短縮)
    const spd = (!tgt && dist > 30) ? s.speed * 1.7 : s.speed;
    const nx = sp.x + mvx * spd * dt, nz = sp.z + mvz * spd * dt;
    if (!collidesAt(nx, sp.z, 0.4, sp.y)) sp.x = nx;
    if (!collidesAt(sp.x, nz, 0.4, sp.y)) sp.z = nz;
    sp.y = terrainH(sp.x, sp.z); // 地形追従

    // スタック検知
    s.stuckT += dt;
    if (s.stuckT > 1.2) {
      const moved = Math.hypot(sp.x - s.prevX, sp.z - s.prevZ);
      if (moved < 0.6 && dist > wantDist + 3) {
        s.avoidDir = Math.random() < .5 ? -1 : 1;
        s.avoidT = 0.8 + Math.random() * 0.6;
        s.strafeT = 0;
      }
      s.prevX = sp.x; s.prevZ = sp.z; s.stuckT = 0;
    }

    // 歩行アニメ
    if (Math.abs(mvx) + Math.abs(mvz) > 0.05) {
      s.walkPhase += dt * 9;
      s.legL.rotation.x = Math.sin(s.walkPhase) * 0.7;
      s.legR.rotation.x = -Math.sin(s.walkPhase) * 0.7;
    } else { s.legL.rotation.x = s.legR.rotation.x = 0; }

    // ---- 射撃 ----
    s.shootCd -= dt;
    if (tgt && s.hasLos && tDist < 65) s.aimT += dt; else s.aimT = 0;
    if (s.shootCd <= 0 && s.aimT > 0.35 && tgt && tDist < 65) {
      s.shootCd = 1.0 + Math.random() * 1.5;
      const eye = new THREE.Vector3(sp.x, sp.y + 1.6, sp.z);
      sfx.distShoot(camera.position.distanceTo(eye));
      const tracerColor = s.team === 1 ? 0x8ecbff : 0xff8866;
      if (tgt.kind === 'vehicle' && curVehicle) {
        const hit = Math.random() < Math.max(0.15, 0.75 - tDist * 0.007);
        const target = tPos.clone();
        if (!hit) { target.x += (Math.random() - .5) * 4; target.y += (Math.random() - .5) * 2; target.z += (Math.random() - .5) * 4; }
        spawnTracer(eye, target, tracerColor);
        if (hit) {
          const raw = 6 + Math.random() * 8;
          const vdmg = curVehicle.type === 'tank' ? raw * 0.35 : raw * 1.6;
          curVehicle.hp -= vdmg;
          spawnParticles(target, 0xffee88, 3, 3);
          if (curVehicle.hp <= 0) destroyVehicle(curVehicle);
          else updateVehicleUI();
        }
      } else if (tgt.kind === 'player') {
        const playerMoving = moveMag() > 0.1 ? 0.18 : 0;
        const hitChance = Math.max(0.05, 0.5 - tDist * 0.007 - playerMoving);
        const hit = Math.random() < hitChance;
        const target = player.pos.clone();
        if (!hit) { target.x += (Math.random() - .5) * 3; target.y += (Math.random() - .5) * 2; target.z += (Math.random() - .5) * 3; }
        spawnTracer(eye, target, tracerColor);
        if (hit) damagePlayer(6 + Math.random() * 8 | 0);
      } else if (tgt.kind === 'soldier') {
        const hit = Math.random() < Math.max(0.08, 0.42 - tDist * 0.005);
        const target = tPos.clone();
        if (!hit) { target.x += (Math.random() - .5) * 3; target.y += (Math.random() - .5) * 2; target.z += (Math.random() - .5) * 3; }
        spawnTracer(eye, target, tracerColor);
        if (hit) damageSoldier(tgt.s, 12 + Math.random() * 14, target, s.team === 1);
      }
    }
  }
}

function damageSoldier(s, dmg, point, byPlayerTeam) {
  if (!s.alive) return;
  s.hp -= dmg;
  spawnParticles(point, 0xbb2222, 5, 3);
  if (s.hp <= 0) {
    s.alive = false; s.deathT = 0;
    // チケット減少
    if (s.team === 1) game.ticketsBlue = Math.max(0, game.ticketsBlue - 1);
    else game.ticketsRed = Math.max(0, game.ticketsRed - 1);
    updateTicketsUI();
    checkMatchEnd();
  }
}
// プレイヤーの攻撃による撃破
function playerKillSoldier(s, point) {
  if (!s.alive) return;
  s.alive = false; s.deathT = 0;
  game.kills++; game.score += 100;
  game.ticketsRed = Math.max(0, game.ticketsRed - 1);
  sfx.kill();
  addFeed('敵兵を倒した +100');
  updateScoreUI(); updateTicketsUI();
  checkMatchEnd();
}
function damageSoldierByPlayer(s, dmg, point) {
  if (!s.alive) return;
  if (s.team === 1) return; // 味方は撃てない (FFなし)
  s.hp -= dmg;
  spawnParticles(point, 0xbb2222, 6, 3);
  sfx.hit();
  if (s.hp <= 0) playerKillSoldier(s, point);
}

/* =========================================================
   Conquest logic — 占領・チケット
   ========================================================= */
const CAP_TIME = 8;    // 占領に要する秒数 (人数で加速)
function countInFlag(f) {
  let blue = 0, red = 0;
  if (player.alive && Math.hypot(player.pos.x - f.x, player.pos.z - f.z) < FLAG_R) blue++;
  for (const s of soldiers) {
    if (!s.alive) continue;
    if (Math.hypot(s.obj.position.x - f.x, s.obj.position.z - f.z) < FLAG_R) {
      if (s.team === 1) blue++; else red++;
    }
  }
  return [blue, red];
}
function updateFlags(dt) {
  let playerCapping = null;
  for (const f of flags) {
    const [blue, red] = countInFlag(f);
    const net = blue - red;
    const el = document.getElementById('flag-' + f.id);
    let hot = false;
    if (net !== 0 && (blue > 0) !== (red > 0) || (blue > 0 && red > 0)) hot = blue > 0 || red > 0;
    if (net > 0 && f.own !== 1) {
      // 青が占領を進める (中立化 → 占領)
      f.cap += dt * Math.min(net, 3) / CAP_TIME;
      hot = true;
      if (f.cap >= 1) {
        f.cap = 0;
        if (f.own === -1) { f.own = 0; }            // まず中立化
        else {
          f.own = 1;
          sfx.capture();
          addFeed(f.id + ' 拠点を占領!', 'blue');
          if (blue > 0 && Math.hypot(player.pos.x - f.x, player.pos.z - f.z) < FLAG_R) {
            game.score += 200; addFeed('占領ボーナス +200'); updateScoreUI();
          }
        }
        updateFlagVisual(f);
      }
    } else if (net < 0 && f.own !== -1) {
      f.cap += dt * Math.min(-net, 3) / CAP_TIME;
      hot = true;
      if (f.cap >= 1) {
        f.cap = 0;
        if (f.own === 1) { f.own = 0; sfx.lost(); addFeed(f.id + ' 拠点を失った', 'red'); }
        else f.own = -1;
        updateFlagVisual(f);
      }
    } else if (net === 0) {
      f.cap = Math.max(0, f.cap - dt * 0.15);
    }
    // HUD 拠点アイコン
    if (el) {
      el.className = 'flag-ic' + (f.own === 1 ? ' f-blue' : f.own === -1 ? ' f-red' : '') + (hot ? ' f-hot' : '');
    }
    // プレイヤーが圏内で進行中なら占領バー表示
    if (Math.hypot(player.pos.x - f.x, player.pos.z - f.z) < FLAG_R && f.cap > 0.01 && net > 0 && f.own !== 1) {
      playerCapping = f;
    }
  }
  // 占領バーUI
  if (playerCapping) {
    ui.capBox.style.display = 'block';
    ui.capLabel.textContent = playerCapping.id + (playerCapping.own === -1 ? ' 中立化中' : ' 占領中');
    ui.capFill.style.width = (playerCapping.cap * 100) + '%';
  } else {
    ui.capBox.style.display = 'none';
  }
}
// チケット bleed: 過半数 (3以上) 保持で相手チケット減少
function updateTickets(dt) {
  game.bleedT += dt;
  if (game.bleedT < 1) return;
  game.bleedT = 0;
  let blueFlags = 0, redFlags = 0;
  for (const f of flags) {
    if (f.own === 1) blueFlags++;
    else if (f.own === -1) redFlags++;
  }
  let changed = false;
  if (blueFlags >= 3) { game.ticketsRed = Math.max(0, game.ticketsRed - (blueFlags - 2)); changed = true; }
  if (redFlags >= 3) { game.ticketsBlue = Math.max(0, game.ticketsBlue - (redFlags - 2)); changed = true; }
  if (changed) { updateTicketsUI(); checkMatchEnd(); }
}
function checkMatchEnd() {
  if (!game.running) return;
  if (game.ticketsRed <= 0) endMatch(true);
  else if (game.ticketsBlue <= 0) endMatch(false);
}
function endMatch(win) {
  game.running = false;
  stopEngine();
  document.exitPointerLock && document.exitPointerLock();
  const title = document.getElementById('gameover-title');
  title.textContent = win ? '勝利' : '敗北';
  title.style.color = win ? '#8affc1' : '#ff6b5e';
  title.style.textShadow = win ? '0 0 25px rgba(0,255,140,.9)' : '0 0 25px rgba(255,60,40,.9)';
  document.getElementById('final-stats').innerHTML =
    `SCORE: ${game.score}<br>KILLS: ${game.kills}<br>チケット BLUE ${game.ticketsBlue} — RED ${game.ticketsRed}`;
  document.getElementById('respawn-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'flex';
}

function spawnVehicles() {
  for (const v of vehicles) scene.remove(v.obj);
  vehicles.length = 0;
  // 青HQ付近
  createJeep(HQ_BLUE.x + 12, HQ_BLUE.z - 14, -Math.PI / 4);
  createTank(HQ_BLUE.x - 4, HQ_BLUE.z - 20, -Math.PI / 4);
  // 中立 (拠点C付近と道路沿い)
  createJeep(12, 36, Math.PI / 2);
  createJeep(-40, -20, 0);
}

function destroyVehicle(v) {
  if (!v.alive) return;
  v.alive = false;
  v.speed = 0;
  sfx.explosion();
  const p = v.obj.position.clone(); p.y += 1;
  spawnParticles(p, 0xff8830, 22, 8, 3);
  spawnParticles(p, 0x333333, 16, 5, 4);
  flashExplosionLight(p);
  shake = 0.6;
  v.obj.traverse(m => { if (m.isMesh) m.material = matWreck; });
  for (const s of soldiers) {
    if (!s.alive) continue;
    const d = s.obj.position.distanceTo(v.obj.position);
    if (d < 7) {
      if (s.team === -1) damageSoldierByPlayer(s, 200, s.obj.position.clone().setY(s.obj.position.y + 1.2));
      else damageSoldier(s, 200, s.obj.position.clone().setY(s.obj.position.y + 1.2));
    }
  }
  if (curVehicle === v) {
    exitVehicle(true);
    damagePlayer(25);
  }
}

function nearestVehicle() {
  let best = null, bd = 4.5;
  for (const v of vehicles) {
    if (!v.alive) continue;
    const d = Math.hypot(v.obj.position.x - player.pos.x, v.obj.position.z - player.pos.z);
    if (d < bd + v.radius) { bd = d; best = v; }
  }
  return best;
}
function enterVehicle(v) {
  curVehicle = v;
  gunGroup.visible = false;
  firing = false;
  sfx.enter();
  startEngine(v.type);
  ui.vehicleBox.style.display = 'block';
  ui.vehicleName.textContent = v.name;
  ui.weaponName.textContent = v.type === 'tank' ? '125mm 主砲' : 'M2 重機関銃';
  ui.ammoMag.textContent = '∞';
  ui.ammoMag.style.color = '#fff';
  ui.reloadHint.textContent = '';
  updateVehicleUI();
}
function exitVehicle(forced = false) {
  if (!curVehicle) return;
  const v = curVehicle;
  const side = new THREE.Vector3(Math.cos(v.yaw), 0, -Math.sin(v.yaw));
  for (const s of [1, -1, 1.6, -1.6]) {
    const px = v.obj.position.x + side.x * (v.radius + 0.8) * s;
    const pz = v.obj.position.z + side.z * (v.radius + 0.8) * s;
    if (!collidesAt(px, pz, player.radius, terrainH(px, pz) + 1)) {
      player.pos.set(px, terrainH(px, pz) + player.eyeHeight, pz);
      break;
    }
  }
  curVehicle = null;
  gunGroup.visible = true;
  firing = false;
  stopEngine();
  if (!forced) sfx.enter();
  ui.vehicleBox.style.display = 'none';
  ui.weaponName.textContent = 'M4A1 CARBINE';
  updateAmmoUI();
}
function toggleVehicle() {
  if (!game.running || !player.alive) return;
  if (curVehicle) { exitVehicle(); return; }
  const v = nearestVehicle();
  if (v) enterVehicle(v);
}

// 戦車砲弾 (プール)
const shells = [];
const shellGeo = new THREE.SphereGeometry(0.16, 6, 5);
const shellMat = new THREE.MeshBasicMaterial({ color: 0xffcc66 });
for (let i = 0; i < 4; i++) {
  const m = new THREE.Mesh(shellGeo, shellMat);
  m.visible = false;
  scene.add(m);
  shells.push({ m, vel: new THREE.Vector3(), ttl: 0 });
}
function fireShell(from, dir) {
  let s = shells.find(s => s.ttl <= 0) || shells[0];
  s.m.position.copy(from);
  s.vel.copy(dir).multiplyScalar(70);
  s.ttl = 4;
  s.m.visible = true;
}
function explodeAt(pos, radius = 6.5, dmg = 140) {
  sfx.explosion();
  spawnParticles(pos, 0xff8830, 18, 8, 3);
  spawnParticles(pos, 0x554433, 12, 5, 2.5);
  spawnParticles(pos, 0x333333, 10, 3.5, 3.5);
  flashExplosionLight(pos);
  for (const s of soldiers) {
    if (!s.alive) continue;
    const d = s.obj.position.distanceTo(pos);
    if (d < radius) {
      const dd = dmg * (1 - d / radius) + 25;
      if (s.team === -1) damageSoldierByPlayer(s, dd, s.obj.position.clone().setY(s.obj.position.y + 1.2));
      else damageSoldier(s, dd, s.obj.position.clone().setY(s.obj.position.y + 1.2));
    }
  }
  const pd = player.pos.distanceTo(pos);
  if (!curVehicle && pd < radius * 0.8) damagePlayer(Math.round(35 * (1 - pd / (radius * 0.8))));
  const camD = camera.position.distanceTo(pos);
  if (camD < 25) shake = Math.max(shake, 0.5 * (1 - camD / 25));
}
function updateShells(dt) {
  for (const s of shells) {
    if (s.ttl <= 0) continue;
    s.ttl -= dt;
    s.vel.y -= 6 * dt;
    const steps = 2;
    for (let i = 0; i < steps; i++) {
      s.m.position.addScaledVector(s.vel, dt / steps);
      const p = s.m.position;
      let boom = p.y <= terrainH(p.x, p.z) + 0.1 || heightBlocked(p);
      if (!boom) {
        for (const sl of soldiers) {
          if (sl.alive && sl.obj.position.distanceTo(p) < 1.4) { boom = true; break; }
        }
      }
      if (boom || s.ttl <= 0) {
        s.ttl = 0; s.m.visible = false;
        explodeAt(p.clone().setY(Math.max(p.y, terrainH(p.x, p.z) + 0.4)));
        break;
      }
    }
  }
}
function heightBlocked(p) {
  for (const o of obstacles) {
    if (p.x > o.minX - 0.2 && p.x < o.maxX + 0.2 && p.z > o.minZ - 0.2 && p.z < o.maxZ + 0.2 && p.y > o.y0 - 0.5 && p.y < o.h) return true;
  }
  return false;
}

// 車両運転 (地形の高さ・傾斜に追従)
function updateVehicle(dt) {
  const v = curVehicle;
  let throttle = 0, steer = 0;
  if (isMobile) {
    throttle = -joy.y;
    steer = joy.x;
  } else {
    if (keys['KeyW']) throttle += 1;
    if (keys['KeyS']) throttle -= 1;
    if (keys['KeyA']) steer -= 1;
    if (keys['KeyD']) steer += 1;
  }
  if (throttle !== 0) {
    v.speed += throttle * v.accel * dt;
  } else {
    v.speed *= Math.pow(0.4, dt);
    if (Math.abs(v.speed) < 0.15) v.speed = 0;
  }
  // 坂の影響: 上りで減速
  const aheadH = terrainH(v.obj.position.x - Math.sin(v.yaw) * 3, v.obj.position.z - Math.cos(v.yaw) * 3);
  const slope = (aheadH - terrainH(v.obj.position.x, v.obj.position.z)) / 3;
  v.speed -= slope * Math.sign(v.speed) * (v.type === 'tank' ? 2.5 : 5) * dt * Math.abs(v.speed) * 0.4;
  v.speed = Math.max(-v.maxSpeed * 0.45, Math.min(v.maxSpeed, v.speed));
  if (Math.abs(v.speed) > 0.3) {
    v.yaw -= steer * v.turnRate * dt * Math.sign(v.speed) * Math.min(1, Math.abs(v.speed) / 4);
  }
  const fx = -Math.sin(v.yaw), fz = -Math.cos(v.yaw);
  const nx = v.obj.position.x + fx * v.speed * dt;
  const nz = v.obj.position.z + fz * v.speed * dt;
  if (!collidesAt(nx, nz, v.radius, terrainH(nx, nz) + 1, v)) {
    v.obj.position.x = nx;
    v.obj.position.z = nz;
  } else {
    if (Math.abs(v.speed) > 6) {
      spawnParticles(v.obj.position.clone().setY(v.obj.position.y + 1), 0x999999, 5, 3);
      playBeep(90, 0.15, 0.15, 'sawtooth');
    }
    v.speed *= -0.25;
  }
  // 地形追従 (高さ + ピッチ/ロール)
  const px = v.obj.position.x, pz = v.obj.position.z;
  v.obj.position.y = terrainH(px, pz);
  const hF = terrainH(px + fx * 2, pz + fz * 2);
  const hB = terrainH(px - fx * 2, pz - fz * 2);
  const sx = Math.cos(v.yaw), sz = -Math.sin(v.yaw);
  const hL = terrainH(px - sx * 1.5, pz - sz * 1.5);
  const hR = terrainH(px + sx * 1.5, pz + sz * 1.5);
  v.obj.rotation.order = 'YXZ';
  v.obj.rotation.y = v.yaw;
  v.obj.rotation.x = Math.atan2(hB - hF, 4) * 0.7;
  v.obj.rotation.z = Math.atan2(hL - hR, 3) * 0.7;
  for (const w of v.wheels) w.rotation.x += v.speed * dt * 2.2;
  // 轢殺
  if (Math.abs(v.speed) > 4) {
    for (const s of soldiers) {
      if (!s.alive) continue;
      const d = Math.hypot(s.obj.position.x - v.obj.position.x, s.obj.position.z - v.obj.position.z);
      if (d < v.radius + 0.6) {
        if (s.team === -1) { damageSoldierByPlayer(s, 999, s.obj.position.clone().setY(s.obj.position.y + 1)); if (!s.alive) addFeed('轢殺!! +100'); }
        else damageSoldier(s, 999, s.obj.position.clone().setY(s.obj.position.y + 1));
        v.speed *= 0.85;
      }
    }
  }
  updateEngine(v.speed);

  // 三人称カメラ
  const cp = Math.max(-0.5, Math.min(1.1, player.pitch));
  const cd = v.camDist;
  const cx = v.obj.position.x + Math.sin(player.yaw) * cd * Math.cos(cp);
  const cz = v.obj.position.z + Math.cos(player.yaw) * cd * Math.cos(cp);
  const cy = v.obj.position.y + v.camH + cd * Math.sin(cp) * 0.9 + 1;
  const groundY = terrainH(cx, cz) + 0.8;
  camera.position.set(cx, Math.max(groundY, cy), cz);
  camera.lookAt(v.obj.position.x, v.obj.position.y + 1.6, v.obj.position.z);
  if (shake > 0.01) {
    camera.position.x += (Math.random() - .5) * shake;
    camera.position.y += (Math.random() - .5) * shake;
  }
  player.pos.set(v.obj.position.x, v.obj.position.y + player.eyeHeight, v.obj.position.z);

  const camDir = new THREE.Vector3();
  camera.getWorldDirection(camDir);
  const aimYaw = Math.atan2(-camDir.x, -camDir.z);
  v.turret.rotation.y = aimYaw - v.yaw;

  v.cd -= dt;
  if (firing && v.cd <= 0) {
    v.cd = v.fireInterval;
    const muzzleWorld = new THREE.Vector3();
    v.muzzle.getWorldPosition(muzzleWorld);
    const aimPoint = camera.position.clone().addScaledVector(camDir, 160);
    const dir = aimPoint.sub(muzzleWorld).normalize();
    if (v.type === 'tank') {
      sfx.cannon();
      fireShell(muzzleWorld, dir);
      spawnParticles(muzzleWorld, 0xffcc66, 6, 4);
      flashExplosionLight(muzzleWorld);
      shake = Math.max(shake, 0.35);
      v.speed *= 0.9;
    } else {
      sfx.mg();
      const spread = 0.015;
      dir.x += (Math.random() - .5) * spread;
      dir.y += (Math.random() - .5) * spread;
      dir.z += (Math.random() - .5) * spread;
      dir.normalize();
      shootRay.set(muzzleWorld, dir);
      shootRay.far = 250;
      const hitsE = shootRay.intersectObjects(soldierHitMeshes, false).filter(h => h.object.userData.soldier && h.object.userData.soldier.alive && h.object.userData.soldier.team === -1);
      const hitsW = shootRay.intersectObjects(solidMeshes, false);
      let end = muzzleWorld.clone().addScaledVector(dir, 250);
      const eDist = hitsE.length ? hitsE[0].distance : Infinity;
      const wDist = hitsW.length ? hitsW[0].distance : Infinity;
      if (eDist < wDist) {
        end = hitsE[0].point;
        damageSoldierByPlayer(hitsE[0].object.userData.soldier, v.dmg, hitsE[0].point);
        showHitmarker();
      } else if (wDist < Infinity) {
        end = hitsW[0].point;
        spawnParticles(end, 0xb0a890, 3, 2);
      }
      spawnTracer(muzzleWorld, end, 0xffe9a0);
    }
  }
  updateVehicleUI();
}
function updateVehicleUI() {
  const v = curVehicle;
  if (!v) return;
  ui.vehicleFill.style.width = (v.hp / v.maxHp * 100) + '%';
  ui.vehicleFill.style.background = v.hp / v.maxHp > 0.35 ? 'linear-gradient(90deg,#3dc9dc,#a7e9f3)' : 'linear-gradient(90deg,#e0483d,#f3a7a0)';
  ui.vehicleSpeed.textContent = Math.abs(Math.round(v.speed * 3.6)) + ' km/h';
}

// ---------- Collision helpers (地形の高さ考慮) ----------
// yRef: 判定する足元の高さ。obstacle の上面より十分高ければ通れる(=段の上に乗れる)
function collidesAt(x, z, r, yRef, skipVehicle = null) {
  if (x < -WORLD || x > WORLD || z < -WORLD || z > WORLD) return true;
  for (const o of obstacles) {
    if (x + r > o.minX && x - r < o.maxX && z + r > o.minZ && z - r < o.maxZ) {
      // 足元がオブジェクト上面近く以上なら乗り越え可能
      if (yRef !== undefined && yRef > o.h - 0.4) continue;
      return true;
    }
  }
  for (const v of vehicles) {
    if (v === skipVehicle) continue;
    const dx = x - v.obj.position.x, dz = z - v.obj.position.z;
    if (dx * dx + dz * dz < (r + v.radius) * (r + v.radius)) return true;
  }
  return false;
}
const raycaster = new THREE.Raycaster();
function hasLineOfSight(from, to) {
  const dir = to.clone().sub(from);
  const dist = dir.length();
  raycaster.set(from, dir.normalize());
  raycaster.far = dist - 0.5;
  if (raycaster.intersectObjects(solidMeshes, false).length > 0) return false;
  // 地形による遮蔽 (数点サンプリング)
  const steps = Math.min(10, Math.max(3, dist / 8 | 0));
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    const x = from.x + (to.x - from.x) * t;
    const y = from.y + (to.y - from.y) * t;
    const z = from.z + (to.z - from.z) * t;
    if (terrainH(x, z) > y + 0.2) return false;
  }
  return true;
}

// ---------- Shooting ----------
const shootRay = new THREE.Raycaster();
function playerShoot() {
  if (weapon.reloading || weapon.cooldown > 0 || !player.alive) return;
  if (weapon.mag <= 0) { sfx.empty(); weapon.cooldown = 0.25; return; }
  weapon.mag--; weapon.cooldown = weapon.fireInterval;
  weapon.recoil = 1; weapon.spreadHeat = Math.min(weapon.spreadHeat + 0.15, 1);
  sfx.shoot();
  muzzleFlash.material.opacity = 1;
  muzzleFlash.rotation.z = Math.random() * Math.PI;
  muzzleLight.intensity = 2.5;
  player.pitch = Math.min(player.pitch + 0.009, Math.PI / 2);

  const spread = 0.004 + weapon.spreadHeat * 0.02 + (moveMag() > 0.1 ? 0.012 : 0);
  const dir = new THREE.Vector3(0, 0, -1)
    .applyEuler(new THREE.Euler(player.pitch + (Math.random() - .5) * spread, player.yaw + (Math.random() - .5) * spread, 0, 'YXZ'));
  shootRay.set(camera.position.clone(), dir);
  shootRay.far = 300;

  const hitsE = shootRay.intersectObjects(soldierHitMeshes, false).filter(h => h.object.userData.soldier && h.object.userData.soldier.alive && h.object.userData.soldier.team === -1);
  const hitsW = shootRay.intersectObjects(solidMeshes, false);
  let end = camera.position.clone().addScaledVector(dir, 300);
  const eDist = hitsE.length ? hitsE[0].distance : Infinity;
  const wDist = hitsW.length ? hitsW[0].distance : Infinity;

  if (eDist < wDist) {
    const h = hitsE[0];
    end = h.point;
    const isHead = !!h.object.userData.isHead;
    damageSoldierByPlayer(h.object.userData.soldier, isHead ? 68 : 28, h.point);
    showHitmarker();
  } else if (wDist < Infinity) {
    end = hitsW[0].point;
    spawnParticles(end, 0xb0a890, 4, 2);
  }
  const muzzleWorld = new THREE.Vector3();
  muzzleFlash.getWorldPosition(muzzleWorld);
  spawnTracer(muzzleWorld, end);
  updateAmmoUI();
}

function reload() {
  if (curVehicle || weapon.reloading || weapon.mag === weapon.magSize || !player.alive) return;
  weapon.reloading = true; weapon.reloadTimer = weapon.reloadTime;
  sfx.reload();
  ui.reloadHint.textContent = 'リロード中...';
}

// ---------- Player damage / respawn ----------
function damagePlayer(dmg) {
  if (!player.alive) return;
  player.hp -= dmg;
  player.lastDamageTime = elapsed;
  sfx.damage();
  ui.vignette.style.opacity = Math.min(1, 0.4 + (1 - player.hp / player.maxHp) * 0.6);
  setTimeout(() => { if (player.hp > 30) ui.vignette.style.opacity = 0; }, 220);
  if (player.hp <= 0) { player.hp = 0; playerDie(); }
  updateHpUI();
}
function playerDie() {
  player.alive = false;
  player.respawnT = 5;
  firing = false;
  game.ticketsBlue = Math.max(0, game.ticketsBlue - 1);
  updateTicketsUI();
  if (curVehicle) exitVehicle(true);
  document.getElementById('respawn-screen').style.display = 'flex';
  checkMatchEnd();
}
function respawnPlayer() {
  // 保持拠点 or HQ からリスポーン (最後尾の安全な保持拠点を優先)
  let sp = HQ_BLUE;
  const owned = flags.filter(f => f.own === 1);
  if (owned.length) sp = owned[Math.floor(Math.random() * owned.length)];
  const rx = sp.x + (Math.random() - .5) * 10, rz = sp.z + (Math.random() - .5) * 10;
  player.pos.set(rx, terrainH(rx, rz) + player.eyeHeight, rz);
  player.vel.set(0, 0, 0);
  player.hp = player.maxHp; player.alive = true;
  player.lastDamageTime = -99;
  Object.assign(weapon, { mag: weapon.magSize, reloading: false, cooldown: 0, recoil: 0, spreadHeat: 0 });
  ui.vignette.style.opacity = 0;
  ui.reloadHint.textContent = '';
  updateHpUI(); updateAmmoUI();
  document.getElementById('respawn-screen').style.display = 'none';
}

// ---------- Input: touch ----------
const touchLayer = document.getElementById('touch-layer');
const joyBase = document.getElementById('joystick-base');
const joyStick = document.getElementById('joystick-stick');
const joy = { active: false, id: null, ox: 0, oy: 0, x: 0, y: 0 };
const look = { id: null, lx: 0, ly: 0 };
let jumpQueued = false;

function moveMag() {
  if (isMobile) return Math.hypot(joy.x, joy.y);
  let m = 0;
  if (keys['KeyW'] || keys['KeyA'] || keys['KeyS'] || keys['KeyD']) m = 1;
  return m;
}

if (isMobile) {
  touchLayer.style.display = 'block';
  const JOY_R = 55;

  touchLayer.addEventListener('touchstart', ev => {
    for (const t of ev.changedTouches) {
      if (t.target.classList && t.target.classList.contains('tbtn')) continue;
      if (t.clientX < window.innerWidth * 0.45 && joy.id === null) {
        joy.id = t.identifier; joy.active = true;
        joy.ox = t.clientX; joy.oy = t.clientY;
        joyBase.style.display = 'block';
        joyBase.style.left = (joy.ox - JOY_R) + 'px';
        joyBase.style.top = (joy.oy - JOY_R) + 'px';
        joyStick.style.transform = 'translate(-50%,-50%)';
      } else if (look.id === null) {
        look.id = t.identifier; look.lx = t.clientX; look.ly = t.clientY;
      }
    }
    ev.preventDefault();
  }, { passive: false });

  touchLayer.addEventListener('touchmove', ev => {
    for (const t of ev.changedTouches) {
      if (t.identifier === joy.id) {
        let dx = t.clientX - joy.ox, dy = t.clientY - joy.oy;
        const len = Math.hypot(dx, dy);
        if (len > JOY_R) { dx = dx / len * JOY_R; dy = dy / len * JOY_R; }
        joy.x = dx / JOY_R; joy.y = dy / JOY_R;
        joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      } else if (t.identifier === look.id) {
        player.yaw -= (t.clientX - look.lx) * 0.0045;
        player.pitch = Math.max(-1.45, Math.min(1.45, player.pitch - (t.clientY - look.ly) * 0.0045));
        look.lx = t.clientX; look.ly = t.clientY;
      }
    }
    ev.preventDefault();
  }, { passive: false });

  const endTouch = ev => {
    for (const t of ev.changedTouches) {
      if (t.identifier === joy.id) {
        joy.id = null; joy.active = false; joy.x = joy.y = 0;
        joyBase.style.display = 'none';
      } else if (t.identifier === look.id) look.id = null;
    }
    ev.preventDefault();
  };
  touchLayer.addEventListener('touchend', endTouch, { passive: false });
  touchLayer.addEventListener('touchcancel', endTouch, { passive: false });

  const bindBtn = (id, down, up) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); down(); }, { passive: false });
    el.addEventListener('touchend', e => { e.preventDefault(); e.stopPropagation(); up && up(); }, { passive: false });
  };
  bindBtn('btn-fire', () => firing = true, () => firing = false);
  bindBtn('btn-fire-alt', () => firing = true, () => firing = false);
  bindBtn('btn-jump', () => jumpQueued = true);
  bindBtn('btn-reload', () => reload());
  bindBtn('btn-vehicle', () => toggleVehicle());
}

// ---------- Player movement (地形追従) ----------
function updatePlayer(dt) {
  if (!player.alive) return;
  let ix = 0, iz = 0, sprint = false;
  if (isMobile) {
    ix = joy.x; iz = joy.y;
    sprint = joy.y < -0.92;
  } else {
    if (keys['KeyW']) iz -= 1;
    if (keys['KeyS']) iz += 1;
    if (keys['KeyA']) ix -= 1;
    if (keys['KeyD']) ix += 1;
    const l = Math.hypot(ix, iz); if (l > 1) { ix /= l; iz /= l; }
    sprint = !!keys['ShiftLeft'] && iz < 0;
    if (keys['Space']) jumpQueued = true;
  }
  const speed = sprint ? 9.5 : 5.5;
  const sin = Math.sin(player.yaw), cos = Math.cos(player.yaw);
  // カメラ空間(前=-Z)→ワールドへの回転変換 (v0.1.1 修正済み)
  const wx = (ix * cos + iz * sin) * speed;
  const wz = (iz * cos - ix * sin) * speed;

  if (jumpQueued && player.onGround) { player.vel.y = 6.5; player.onGround = false; }
  jumpQueued = false;
  player.vel.y -= 18 * dt;

  const footY = player.pos.y - player.eyeHeight;
  const nx = player.pos.x + wx * dt;
  if (!collidesAt(nx, player.pos.z, player.radius, footY)) player.pos.x = nx;
  const nz = player.pos.z + wz * dt;
  if (!collidesAt(player.pos.x, nz, player.radius, footY)) player.pos.z = nz;
  player.pos.y += player.vel.y * dt;
  // 地形との接地
  const groundY = terrainH(player.pos.x, player.pos.z) + player.eyeHeight;
  if (player.pos.y <= groundY) {
    player.pos.y = groundY; player.vel.y = 0; player.onGround = true;
  }

  camera.position.copy(player.pos);
  const moving = Math.hypot(wx, wz) > 0.5;
  if (moving && player.onGround) {
    bobT += dt * (sprint ? 13 : 9);
    camera.position.y += Math.sin(bobT) * 0.035;
  }
  camera.rotation.set(player.pitch, player.yaw, 0);
  if (shake > 0.01) {
    camera.position.x += (Math.random() - .5) * shake;
    camera.position.y += (Math.random() - .5) * shake;
  }

  weapon.recoil = Math.max(0, weapon.recoil - dt * 8);
  weapon.spreadHeat = Math.max(0, weapon.spreadHeat - dt * 1.2);
  gunGroup.position.z = -0.55 + weapon.recoil * 0.06;
  gunGroup.rotation.x = weapon.recoil * 0.05;
  gunGroup.position.y = -0.26 + (moving ? Math.sin(bobT) * 0.012 : 0);
  if (weapon.reloading) gunGroup.rotation.x = -0.5 + Math.sin(weapon.reloadTimer * 3) * 0.1;

  weapon.cooldown -= dt;
  if (weapon.reloading) {
    weapon.reloadTimer -= dt;
    if (weapon.reloadTimer <= 0) {
      weapon.reloading = false; weapon.mag = weapon.magSize;
      ui.reloadHint.textContent = '';
      updateAmmoUI();
    }
  }
  if (firing) playerShoot();
  if (weapon.mag === 0 && !weapon.reloading) reload();
}

  clearTimeout(hitmarkerTO);
  hitmarkerTO = setTimeout(() => ui.hitmarker.style.opacity = 0, 90);
}
function addFeed(text, cls = '') {
  const d = document.createElement('div');
  d.className = 'feed-item' + (cls ? ' ' + cls : '');
  d.textContent = text;
  ui.killfeed.appendChild(d);
  setTimeout(() => d.remove(), 1450);
}
let interactT = 0;
function updateInteractHint(dt) {
  interactT += dt;
  if (interactT < 0.2) return;
  interactT = 0;
  if (curVehicle) {
    ui.interactHint.style.display = 'none';
    if (isMobile) { ui.btnVehicle.style.display = 'flex'; ui.btnVehicle.textContent = '降りる'; }
    return;
  }
  const v = nearestVehicle();
  if (v) {
    if (isMobile) {
      ui.btnVehicle.style.display = 'flex'; ui.btnVehicle.textContent = '乗る';
      ui.interactHint.style.display = 'none';
    } else {
      ui.interactHint.textContent = 'E: ' + v.name + ' に乗る';
      ui.interactHint.style.display = 'block';
    }
  } else {
    ui.interactHint.style.display = 'none';
    if (isMobile) ui.btnVehicle.style.display = 'none';
  }
}
function drawRadar() {
  const g = ui.radar, S = 112, C = S / 2, RANGE = 95;
  g.clearRect(0, 0, S, S);
  g.strokeStyle = 'rgba(120,200,255,.25)';
  g.beginPath(); g.arc(C, C, 37, 0, 7); g.stroke();
  g.beginPath(); g.arc(C, C, 19, 0, 7); g.stroke();
  const toRadar = (wx, wz) => {
    const dx = wx - player.pos.x, dz = wz - player.pos.z;
    const rx = dx * Math.cos(-player.yaw) - dz * Math.sin(-player.yaw);
    const rz = dx * Math.sin(-player.yaw) + dz * Math.cos(-player.yaw);
    return [C + rx / RANGE * C, C + rz / RANGE * C];
  };
  // 拠点 (色つき文字)
  g.font = 'bold 10px sans-serif';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  for (const f of flags) {
    let [px, pz] = toRadar(f.x, f.z);
    const dd = Math.hypot(px - C, pz - C);
    if (dd > C - 8) { // 端にクランプ
      px = C + (px - C) / dd * (C - 8);
      pz = C + (pz - C) / dd * (C - 8);
    }
    g.fillStyle = f.own === 1 ? '#6db4ff' : f.own === -1 ? '#ff6b5e' : '#cccccc';
    g.beginPath(); g.arc(px, pz, 6, 0, 7); g.fill();
    g.fillStyle = '#06131f';
    g.fillText(f.id, px, pz + 0.5);
  }
  // 車両
  for (const v of vehicles) {
    if (!v.alive || v === curVehicle) continue;
    const [px, pz] = toRadar(v.obj.position.x, v.obj.position.z);
    if (Math.hypot(px - C, pz - C) < C - 5) {
      g.fillStyle = '#5aff9c';
      g.fillRect(px - 3, pz - 3, 6, 6);
    }
  }
  // 兵士 (敵=赤 / 味方=青)
  for (const s of soldiers) {
    if (!s.alive) continue;
    const [px, pz] = toRadar(s.obj.position.x, s.obj.position.z);
    if (Math.hypot(px - C, pz - C) < C - 4) {
      g.fillStyle = s.team === 1 ? '#6db4ff' : '#ff4438';
      g.beginPath(); g.arc(px, pz, 2.6, 0, 7); g.fill();
    }
  }
  // player arrow
  g.fillStyle = '#ffffff';
  g.beginPath(); g.moveTo(C, C - 6); g.lineTo(C - 4, C + 4); g.lineTo(C + 4, C + 4); g.closePath(); g.fill();
}

// ---------- Game flow ----------
function resetGame() {
  // 兵士全削除
  for (const s of soldiers) scene.remove(s.obj);
  soldiers.length = 0; soldierHitMeshes.length = 0;
  clearEffects();
  for (const s of shells) { s.ttl = 0; s.m.visible = false; }
  if (curVehicle) { curVehicle = null; gunGroup.visible = true; stopEngine(); }
  ui.vehicleBox.style.display = 'none';
  ui.weaponName.textContent = 'M4A1 CARBINE';
  spawnVehicles();
  // 拠点リセット
  for (const f of flags) { f.own = 0; f.cap = 0; updateFlagVisual(f); }
  // プレイヤー
  Object.assign(player, { hp: 100, alive: true, yaw: Math.PI * 0.75, pitch: 0, lastDamageTime: -99, onGround: true, respawnT: 0 });
  player.pos.set(HQ_BLUE.x, terrainH(HQ_BLUE.x, HQ_BLUE.z) + player.eyeHeight, HQ_BLUE.z);
  player.vel.set(0, 0, 0);
  Object.assign(weapon, { mag: 30, reloading: false, cooldown: 0, recoil: 0, spreadHeat: 0 });
  game.score = 0; game.kills = 0; firing = false;
  game.ticketsBlue = 150; game.ticketsRed = 150; game.bleedT = 0;
  shake = 0;
  ui.vignette.style.opacity = 0; ui.reloadHint.textContent = '';
  document.getElementById('respawn-screen').style.display = 'none';
  // 味方AI 9体 (青HQ周辺)
  for (let i = 0; i < 9; i++) {
    const a = (i / 9) * Math.PI * 2;
    createSoldier(1, HQ_BLUE.x + Math.cos(a) * (6 + Math.random() * 8), HQ_BLUE.z + Math.sin(a) * (6 + Math.random() * 8));
  }
  // 敵AI 10体 (赤HQ周辺)
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2;
    createSoldier(-1, HQ_RED.x + Math.cos(a) * (6 + Math.random() * 8), HQ_RED.z + Math.sin(a) * (6 + Math.random() * 8));
  }
  updateHpUI(); updateAmmoUI(); updateScoreUI(); updateTicketsUI();
  ui.waveBanner.textContent = 'CONQUEST — 拠点を占領せよ';
  ui.waveBanner.style.opacity = 1;
  setTimeout(() => ui.waveBanner.style.opacity = 0, 2200);
  game.running = true;
}

document.getElementById('start-btn').addEventListener('click', () => {
  initAudio();
  document.getElementById('start-screen').style.display = 'none';
  resetGame();
  if (!isMobile) canvas.requestPointerLock();
});
document.getElementById('restart-btn').addEventListener('click', () => {
  initAudio();
  document.getElementById('gameover-screen').style.display = 'none';
  resetGame();
  if (!isMobile) canvas.requestPointerLock();
});

// ---------- Main loop ----------
let lastT = performance.now(), elapsed = 0, bobT = 0, radarT = 0, shake = 0;
function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;
  if (game.running) {
    elapsed += dt;
    shake = Math.max(0, shake - dt * 1.6);
    if (!player.alive) {
      // リスポーン待機
      player.respawnT -= dt;
      ui.respawnTimer.textContent = '再出撃まで ' + Math.max(1, Math.ceil(player.respawnT));
      if (player.respawnT <= 0 && game.ticketsBlue > 0) respawnPlayer();
    } else if (curVehicle) {
      updateVehicle(dt);
      if (player.hp < player.maxHp && elapsed - player.lastDamageTime > 4) {
        player.hp = Math.min(player.maxHp, player.hp + 12 * dt);
        if (player.hp > 30) ui.vignette.style.opacity = 0;
        updateHpUI();
      }
      muzzleFlash.material.opacity = 0;
      muzzleLight.intensity = 0;
    } else {
      updatePlayer(dt);
      if (player.hp < player.maxHp && elapsed - player.lastDamageTime > 4) {
        player.hp = Math.min(player.maxHp, player.hp + 12 * dt);
        if (player.hp > 30) ui.vignette.style.opacity = 0;
        updateHpUI();
      }
      muzzleFlash.material.opacity = Math.max(0, muzzleFlash.material.opacity - dt * 18);
      muzzleLight.intensity = Math.max(0, muzzleLight.intensity - dt * 25);
    }
    updateSoldiers(dt);
    updateFlags(dt);
    updateTickets(dt);
    updateShells(dt);
    updateEffects(dt);
    updateInteractHint(dt);
    radarT += dt;
    if (radarT > 0.12) { radarT = 0; drawRadar(); }
  }
  if (!ctxLost) {
    try { renderer.render(scene, camera); } catch (err) { /* ignore */ }
  }
}
updateHpUI(); updateAmmoUI(); updateScoreUI(); updateTicketsUI();
requestAnimationFrame(loop);

// デバッグ用フック (テスト自動化用 / 本体の動作には影響しない)
window.__dbg = { soldiers, flags, game, player, terrainH };
